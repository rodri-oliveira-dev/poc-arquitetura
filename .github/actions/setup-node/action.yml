name: Setup Node.js
description: Setup Node.js with npm cache and optionally install dependencies.

inputs:
  node-version:
    description: Node.js version used by repository tooling.
    required: false
    default: "22"
  install-dependencies:
    description: Run npm ci after setup.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Node dependencies
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: npm ci --ignore-scripts
