name: main-dotnet-ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SONAR_ORGANIZATION_KEY: rodri-oliveira-dev
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_NON_CSHARP_SCRIPT_EXCLUSIONS: scripts/**/*.sh,scripts/**/*.ps1,scripts/**/*.py,scripts/**/*.json,scripts/**/*.mjs
  AGGREGATE_SOLUTION_PATH: ./PocArquitetura.slnx
  SHARED_SOLUTION_PATH: ./PocArquitetura.Shared.slnx
  ARTIFACTS_ROOT: ./artifacts
  COVERAGE_THRESHOLD: "85"

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect .NET impact
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            python scripts/ci/detect-dotnet-impact.py \
              --fallback-reason "Event $EVENT_NAME does not provide pull request files. Running aggregate and Shared validations." \
              --format github-output >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" > changed-files.json; then
            python scripts/ci/detect-dotnet-impact.py \
              --fallback-reason "Could not detect pull request files. Running aggregate and Shared validations." \
              --format github-output >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python scripts/ci/detect-dotnet-impact.py \
            --files-from changed-files.json \
            --input-format json \
            --format github-output >> "$GITHUB_OUTPUT"

      - name: Summarize impact detection
        shell: bash
        env:
          SUMMARY_JSON: ${{ steps.changes.outputs.summary_json }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(os.environ["SUMMARY_JSON"])
          rows = [
              ("Aggregate solution", result["run_aggregate"]),
              ("Shared solution", result["run_shared"]),
              ("Documentation only", result["docs_only"]),
              ("Detection fallback", result["detection_failed"]),
          ]

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("### .NET impact detection\n\n")
              summary.write("| Output | Value |\n")
              summary.write("| --- | --- |\n")
              for name, value in rows:
                  summary.write(f"| {name} | `{str(value).lower()}` |\n")
              summary.write(f"| Changed C# files | `{result['changed_csharp_count']}` |\n")
          PY

      - name: Skip CI for documentation-only PR
        if: ${{ steps.changes.outputs.run_aggregate != 'true' && steps.changes.outputs.run_shared != 'true' }}
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'

          ### CI skipped

          Apenas arquivos de documentacao ou imagens de documentacao foram alterados. Restore, auditoria NuGet, SonarQube, build, testes e cobertura foram ignorados.
          EOF

      - name: Setup .NET
        if: ${{ steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true' }}
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Prepare artifacts
        if: ${{ steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true' }}
        shell: bash
        run: |
          rm -rf "$ARTIFACTS_ROOT/test-results" "$ARTIFACTS_ROOT/sonarqube"
          mkdir -p "$ARTIFACTS_ROOT/test-results" "$ARTIFACTS_ROOT/sonarqube"

      - name: Run impacted .NET CI contexts
        if: ${{ steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true' }}
        shell: bash
        env:
          RUN_AGGREGATE: ${{ steps.changes.outputs.run_aggregate }}
          RUN_SHARED: ${{ steps.changes.outputs.run_shared }}
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          SONAR_PULL_REQUEST: ${{ github.event.pull_request.number || '' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          sonar_allowed=true
          if [ "$IS_FORK_PULL_REQUEST" = "true" ]; then
            sonar_allowed=false
          fi

          contexts=()
          if [ "$RUN_AGGREGATE" = "true" ]; then
            contexts+=("aggregate|$AGGREGATE_SOLUTION_PATH|true|85|LedgerService.Worker,BalanceService.Worker|rodri-oliveira-dev_poc-arquitetura|poc-arquitetura|")
          fi
          if [ "$RUN_SHARED" = "true" ]; then
            contexts+=("shared|$SHARED_SOLUTION_PATH|false|80||||")
          fi
          if [ "$RUN_AGGREGATE" = "true" ] && [ "$RUN_SHARED" = "true" ]; then
            contexts+=("integrated-shared|$AGGREGATE_SOLUTION_PATH|false|85|LedgerService.Worker,BalanceService.Worker|||-p:UseLocalSharedProjects=true")
          fi

          sonar_required=false
          for item in "${contexts[@]}"; do
            IFS="|" read -r _context _solution sonar_enabled _coverage_threshold _required_assemblies _project_key _project_name _msbuild_properties <<< "$item"
            if [ "$sonar_enabled" = "true" ]; then
              sonar_required=true
            fi
          done

          if [ "$sonar_required" = "true" ] && [ "$sonar_allowed" = "true" ] && [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN is not configured. Create the GitHub Actions repository secret before running SonarQube Cloud analysis." >&2
            exit 1
          fi

          if [ "$sonar_required" = "true" ] && [ "$sonar_allowed" = "false" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'

          ### SonarQube Cloud

          Pull request de fork detectado. A analise SonarQube Cloud foi ignorada para nao expor secrets a codigo nao confiavel; restore, auditoria NuGet, build, testes e cobertura continuam ativos.
          EOF
          fi

          check_nuget_vulnerabilities() {
            local vulnerabilities_file="$1"
            python - "$vulnerabilities_file" <<'PY'
          import json
          import sys

          blocked_severities = {"moderate", "high", "critical"}

          with open(sys.argv[1], encoding="utf-8") as f:
              data = json.load(f)

          findings = []
          for project in data.get("projects", []):
              project_path = project.get("path", "")
              for framework in project.get("frameworks", []):
                  packages = []
                  packages.extend(framework.get("topLevelPackages", []))
                  packages.extend(framework.get("transitivePackages", []))

                  for package in packages:
                      for vulnerability in package.get("vulnerabilities", []):
                          severity = vulnerability.get("severity", "").lower()
                          if severity in blocked_severities:
                              findings.append(
                                  (
                                      project_path,
                                      package.get("id", ""),
                                      package.get("resolvedVersion", ""),
                                      vulnerability.get("severity", ""),
                                      vulnerability.get("advisoryurl", ""),
                                  )
                              )

          if findings:
              print("Moderate/High/Critical NuGet vulnerabilities found:", file=sys.stderr)
              for project_path, package_id, version, severity, advisory in findings:
                  print(f"- {project_path}: {package_id} {version} ({severity}) {advisory}", file=sys.stderr)
              sys.exit(1)

          print("No Moderate/High/Critical NuGet vulnerabilities found.")
          PY
          }

          enforce_coverage_threshold() {
            local summary_file="$1"
            local threshold="$2"
            local required_assemblies="$3"
            python scripts/quality/enforce_coverage_threshold.py "$summary_file" "$threshold" "$required_assemblies"
          }

          write_context_summary() {
            local context="$1"
            local solution="$2"
            local coverage_summary="$3"
            local msbuild_properties="$4"
            python - "$context" "$solution" "$coverage_summary" "$msbuild_properties" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import pathlib
          import sys

          context, solution, coverage_summary, msbuild_properties = sys.argv[1:]
          path = pathlib.Path(coverage_summary)

          print(f"## Resumo do CI - {context}")
          print()
          print(f"- Solution: `{solution}`")
          print(f"- MSBuild properties: `{msbuild_properties or 'default'}`")

          if not path.exists():
              print("- Resumo de cobertura: nao encontrado.")
              print()
              sys.exit(0)

          with path.open(encoding="utf-8") as f:
              payload = json.load(f)

          data = payload["summary"]
          assemblies = {
              assembly["name"]: assembly["coverage"]
              for assembly in payload.get("coverage", {}).get("assemblies", [])
          }

          print(f"- Cobertura de linhas: {data['linecoverage']}%")
          print(f"- Cobertura de branches: {data['branchcoverage']}%")
          print(f"- Cobertura de metodos: {data['methodcoverage']}%")
          for assembly_name, coverage in sorted(assemblies.items()):
              print(f"- {assembly_name}: {coverage}% de linhas")
          print()
          PY
          }

          for item in "${contexts[@]}"; do
            IFS="|" read -r context solution sonar_enabled coverage_threshold required_assemblies project_key project_name msbuild_properties <<< "$item"
            test_results_dir="$ARTIFACTS_ROOT/test-results/$context"
            sonar_report_dir="$ARTIFACTS_ROOT/sonarqube/$context"
            opencover_pattern="$test_results_dir/**/coverage.opencover.xml"
            coverage_summary="$test_results_dir/coverage-report/Summary.json"

            echo "Running $context validation with $solution"
            if [ -n "$msbuild_properties" ]; then
              echo "MSBuild properties: $msbuild_properties"
            fi
            mkdir -p "$test_results_dir"
            if [ "$sonar_enabled" = "true" ]; then
              mkdir -p "$sonar_report_dir"
            fi
            sonar_begin_exit_code=0

            dotnet restore "$solution" \
              -p:NuGetAuditMode=all \
              -p:RestoreEnablePackagePruning=true \
              $msbuild_properties

            dotnet list "$solution" package --vulnerable --include-transitive --no-restore --format json > "$ARTIFACTS_ROOT/nuget-vulnerabilities-$context.json"
            check_nuget_vulnerabilities "$ARTIFACTS_ROOT/nuget-vulnerabilities-$context.json"

            if [ "$sonar_enabled" = "true" ] && [ "$sonar_allowed" = "true" ]; then
              rm -rf .sonarqube
              dotnet tool run dotnet-sonarscanner begin \
                /k:"$project_key" \
                /n:"$project_name" \
                /o:"$SONAR_ORGANIZATION_KEY" \
                /d:sonar.token="$SONAR_TOKEN" \
                /d:sonar.host.url="$SONAR_HOST_URL" \
                /d:sonar.cs.opencover.reportsPaths="$opencover_pattern" \
                /d:sonar.scanner.scanAll=false \
                /d:sonar.exclusions="$SONAR_NON_CSHARP_SCRIPT_EXCLUSIONS" \
                /d:sonar.issue.ignore.block=placeholderSecrets \
                /d:sonar.issue.ignore.block.placeholderSecrets.beginBlockRegexp=".*(PASSWORD|[Pp]assword|PWD|PGPASSWORD|CLIENT_SECRET|[Cc]lient[_-]?[Ss]ecret|SECRET|[Ss]ecret|TOKEN|[Tt]oken|API[_-]?KEY|[Aa]pi[_-]?[Kk]ey).*<[A-Z0-9_]*(PASSWORD|SECRET|TOKEN|API_KEY)[A-Z0-9_]*>.*" \
                /d:sonar.issue.ignore.block.placeholderSecrets.endBlockRegexp=".*(PASSWORD|[Pp]assword|PWD|PGPASSWORD|CLIENT_SECRET|[Cc]lient[_-]?[Ss]ecret|SECRET|[Ss]ecret|TOKEN|[Tt]oken|API[_-]?KEY|[Aa]pi[_-]?[Kk]ey).*<[A-Z0-9_]*(PASSWORD|SECRET|TOKEN|API_KEY)[A-Z0-9_]*>.*" \
                /d:sonar.coverage.exclusions=".github/**,docs/**,infra/**,loadtests/**,**/Program.cs,**/Migrations/*.cs,**/*.g.cs,**/*.g.*.cs" \
                /d:sonar.qualitygate.wait=true || sonar_begin_exit_code=$?
            fi

            dotnet build "$solution" --configuration "$BUILD_CONFIGURATION" --no-restore $msbuild_properties

            dotnet test "$solution" \
              --configuration "$BUILD_CONFIGURATION" \
              --no-build \
              --logger "trx;LogFilePrefix=test-results" \
              --results-directory "$test_results_dir" \
              --collect:"XPlat Code Coverage" \
              --settings ./coverlet.runsettings \
              $msbuild_properties

            if ! find "$test_results_dir" -name coverage.cobertura.xml -print -quit | grep -q .; then
              echo "Testes de $context finalizaram com sucesso, mas nenhum arquivo coverage.cobertura.xml foi gerado." >&2
              exit 1
            fi

            if ! find "$test_results_dir" -name coverage.opencover.xml -print -quit | grep -q .; then
              echo "Testes de $context finalizaram com sucesso, mas nenhum arquivo coverage.opencover.xml foi gerado." >&2
              exit 1
            fi

            dotnet tool run reportgenerator \
              -reports:"$test_results_dir/**/coverage.cobertura.xml" \
              -targetdir:"$test_results_dir/coverage-report" \
              -reporttypes:"HtmlInline;JsonSummary;TextSummary"

            enforce_coverage_threshold "$coverage_summary" "$coverage_threshold" "$required_assemblies"
            write_context_summary "$context" "$solution" "$coverage_summary" "$msbuild_properties"

            if [ "$sonar_enabled" = "true" ] && [ "$sonar_allowed" = "true" ]; then
              if [ "$sonar_begin_exit_code" -ne 0 ]; then
                exit "$sonar_begin_exit_code"
              fi

              sonar_exit_code=0
              report_exit_code=0

              dotnet tool run dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN" || sonar_exit_code=$?
              rm -rf .sonarqube

              SONAR_PROJECT_KEY="$project_key" \
              SONAR_PROJECT_NAME="$project_name" \
              SONAR_REPORT_DIR="$sonar_report_dir" \
              SONAR_PULL_REQUEST="$SONAR_PULL_REQUEST" \
              SONAR_TOKEN="$SONAR_TOKEN" \
                python scripts/quality/sonarqube_cloud_report.py || report_exit_code=$?

              if [ -f "$sonar_report_dir/sonarqube-cloud-report.md" ]; then
                cat "$sonar_report_dir/sonarqube-cloud-report.md" >> "$GITHUB_STEP_SUMMARY"
              fi

              if [ "$sonar_exit_code" -ne 0 ]; then
                exit "$sonar_exit_code"
              fi

              if [ "$report_exit_code" -ne 0 ]; then
                exit "$report_exit_code"
              fi
            fi
          done

      - name: Upload test results, coverage and SonarQube report
        if: ${{ always() && (steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-coverage-and-sonarqube
          path: |
            ${{ env.ARTIFACTS_ROOT }}/test-results/**/*.trx
            ${{ env.ARTIFACTS_ROOT }}/test-results/**/coverage.cobertura.xml
            ${{ env.ARTIFACTS_ROOT }}/test-results/**/coverage.opencover.xml
            ${{ env.ARTIFACTS_ROOT }}/test-results/**/coverage-report/Summary.json
            ${{ env.ARTIFACTS_ROOT }}/test-results/**/coverage-report/Summary.txt
            ${{ env.ARTIFACTS_ROOT }}/sonarqube/**
            ${{ env.ARTIFACTS_ROOT }}/nuget-vulnerabilities-*.json
          if-no-files-found: warn
          retention-days: 7
