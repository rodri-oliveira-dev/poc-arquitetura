name: main-dotnet-ci

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.webp"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.webp"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SONAR_CONTEXT: global
  SONAR_ORGANIZATION_KEY: rodri-oliveira-dev
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_PROJECT_KEY: rodri-oliveira-dev_poc-arquitetura
  SONAR_PROJECT_NAME: poc-arquitetura
  SONAR_PULL_REQUEST: ${{ github.event.pull_request.number || '' }}
  SONAR_REPORT_DIR: ./artifacts/sonarqube
  SONAR_OPENCOVER_REPORTS_PATHS: ./artifacts/test-results/**/coverage.opencover.xml
  SOLUTION_PATH: ./PocArquitetura.slnx
  TEST_RESULTS_DIR: ./artifacts/test-results
  COVERAGE_THRESHOLD: "85"

jobs:
  build-test:
    name: Build, test and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Resolve SonarQube analysis context
        shell: bash
        run: python scripts/quality/sonar_context.py "$SONAR_CONTEXT" --format github-env >> "$GITHUB_ENV"

      - name: Prepare consolidated artifacts
        shell: bash
        run: |
          rm -rf "$TEST_RESULTS_DIR"
          rm -rf "$SONAR_REPORT_DIR"
          mkdir -p "$TEST_RESULTS_DIR" "$SONAR_REPORT_DIR"

      - name: Restore dependencies
        run: >
          dotnet restore $SOLUTION_PATH
          -p:NuGetAuditMode=all
          -p:RestoreEnablePackagePruning=true

      - name: Check NuGet vulnerabilities
        shell: bash
        run: |
          dotnet list $SOLUTION_PATH package --vulnerable --include-transitive --no-restore --format json > nuget-vulnerabilities.json

          python - <<'PY'
          import json
          import sys

          blocked_severities = {"moderate", "high", "critical"}

          with open("nuget-vulnerabilities.json", encoding="utf-8") as f:
              data = json.load(f)

          findings = []
          for project in data.get("projects", []):
              project_path = project.get("path", "")
              for framework in project.get("frameworks", []):
                  packages = []
                  packages.extend(framework.get("topLevelPackages", []))
                  packages.extend(framework.get("transitivePackages", []))

                  for package in packages:
                      for vulnerability in package.get("vulnerabilities", []):
                          severity = vulnerability.get("severity", "").lower()
                          if severity in blocked_severities:
                              findings.append(
                                  (
                                      project_path,
                                      package.get("id", ""),
                                      package.get("resolvedVersion", ""),
                                      vulnerability.get("severity", ""),
                                      vulnerability.get("advisoryurl", ""),
                                  )
                              )

          if findings:
              print("Moderate/High/Critical NuGet vulnerabilities found:", file=sys.stderr)
              for project_path, package_id, version, severity, advisory in findings:
                  print(f"- {project_path}: {package_id} {version} ({severity}) {advisory}", file=sys.stderr)
              sys.exit(1)

          print("No Moderate/High/Critical NuGet vulnerabilities found.")
          PY

      - name: Validate SonarQube Cloud token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN is not configured. Create the GitHub Actions repository secret before running SonarQube Cloud analysis." >&2
            exit 1
          fi

      - name: SonarQube Cloud begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PLACEHOLDER_SECRET_LINE_REGEX: ".*(PASSWORD|[Pp]assword|PWD|PGPASSWORD|CLIENT_SECRET|[Cc]lient[_-]?[Ss]ecret|SECRET|[Ss]ecret|TOKEN|[Tt]oken|API[_-]?KEY|[Aa]pi[_-]?[Kk]ey).*<[A-Z0-9_]*(PASSWORD|SECRET|TOKEN|API_KEY)[A-Z0-9_]*>.*"
        run: >
          dotnet tool run dotnet-sonarscanner begin
          /k:"$SONAR_PROJECT_KEY"
          /n:"$SONAR_PROJECT_NAME"
          /o:"$SONAR_ORGANIZATION_KEY"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="$SONAR_HOST_URL"
          /d:sonar.cs.opencover.reportsPaths="$SONAR_OPENCOVER_REPORTS_PATHS"
          /d:sonar.issue.ignore.block=placeholderSecrets
          /d:sonar.issue.ignore.block.placeholderSecrets.beginBlockRegexp="$SONAR_PLACEHOLDER_SECRET_LINE_REGEX"
          /d:sonar.issue.ignore.block.placeholderSecrets.endBlockRegexp="$SONAR_PLACEHOLDER_SECRET_LINE_REGEX"
          /d:sonar.coverage.exclusions=".github/**,docs/**,infra/**,loadtests/**,scripts/**,**/Program.cs,**/Migrations/*.cs,**/*.g.cs,**/*.g.*.cs"
          /d:sonar.qualitygate.wait=true

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test with coverage
        run: >
          dotnet test $SOLUTION_PATH
          --configuration $BUILD_CONFIGURATION
          --no-build
          --logger "trx;LogFilePrefix=test-results"
          --results-directory $TEST_RESULTS_DIR
          --collect:"XPlat Code Coverage"
          --settings ./coverlet.runsettings

      - name: Validate coverage files
        if: ${{ success() }}
        shell: bash
        run: |
          if ! find "$TEST_RESULTS_DIR" -name coverage.cobertura.xml -print -quit | grep -q .; then
            echo "Testes finalizaram com sucesso, mas nenhum arquivo coverage.cobertura.xml foi gerado." >&2
            exit 1
          fi

      - name: Validate SonarQube coverage files
        if: ${{ success() }}
        shell: bash
        run: |
          if ! find "$TEST_RESULTS_DIR" -name coverage.opencover.xml -print -quit | grep -q .; then
            echo "Testes finalizaram com sucesso, mas nenhum arquivo coverage.opencover.xml foi gerado para o SonarQube Cloud." >&2
            exit 1
          fi

      - name: SonarQube Cloud end
        if: ${{ success() }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet tool run dotnet-sonarscanner end
          /d:sonar.token="$SONAR_TOKEN"

      - name: Generate SonarQube Cloud report
        if: ${{ always() }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          python scripts/quality/sonarqube_cloud_report.py
          cat "$SONAR_REPORT_DIR/sonarqube-cloud-report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate coverage report
        if: ${{ success() }}
        run: >
          dotnet tool run reportgenerator
          -reports:"$TEST_RESULTS_DIR/**/coverage.cobertura.xml"
          -targetdir:"$TEST_RESULTS_DIR/coverage-report"
          -reporttypes:"HtmlInline;JsonSummary;TextSummary"

      - name: Enforce coverage threshold
        if: ${{ success() }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import sys
          import os

          path = os.path.join(os.environ["TEST_RESULTS_DIR"], "coverage-report", "Summary.json")
          with open(path, encoding="utf-8") as f:
              data = json.load(f)

          line = float(data["summary"]["linecoverage"])
          threshold = float("${{ env.COVERAGE_THRESHOLD }}")

          print(f"Line coverage: {line}%")
          if line < threshold:
              print(f"Coverage below threshold ({threshold}%).", file=sys.stderr)
              sys.exit(1)

          assemblies = {
              assembly["name"]: float(assembly["coverage"])
              for assembly in data.get("coverage", {}).get("assemblies", [])
          }

          for assembly_name in ("LedgerService.Worker", "BalanceService.Worker"):
              if assembly_name not in assemblies:
                  print(f"Coverage assembly not found: {assembly_name}", file=sys.stderr)
                  sys.exit(1)

              assembly_line = assemblies[assembly_name]
              print(f"{assembly_name} line coverage: {assembly_line}%")
              if assembly_line < threshold:
                  print(
                      f"{assembly_name} coverage below threshold ({threshold}%).",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          PY

      - name: Write summary
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          import pathlib

          path = pathlib.Path(os.environ["TEST_RESULTS_DIR"]) / "coverage-report" / "Summary.json"
          print("## Resumo do CI")
          print()

          if not path.exists():
              print("Resumo de cobertura nao encontrado.")
              print()
              print("As etapas de cobertura podem ter sido ignoradas porque uma etapa anterior falhou antes da execucao dos testes.")
              raise SystemExit(0)

          with path.open(encoding="utf-8") as f:
              payload = json.load(f)

          data = payload["summary"]
          assemblies = {
              assembly["name"]: assembly["coverage"]
              for assembly in payload.get("coverage", {}).get("assemblies", [])
          }

          print(f"- Cobertura de linhas: {data['linecoverage']}%")
          print(f"- Cobertura de branches: {data['branchcoverage']}%")
          print(f"- Cobertura de metodos: {data['methodcoverage']}%")
          for assembly_name in ("LedgerService.Worker", "BalanceService.Worker"):
              if assembly_name in assemblies:
                  print(f"- {assembly_name}: {assemblies[assembly_name]}% de linhas")
          PY

      - name: Upload test results, coverage and SonarQube report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-coverage-and-sonarqube
          path: |
            ${{ env.TEST_RESULTS_DIR }}/**/*.trx
            ${{ env.TEST_RESULTS_DIR }}/**/coverage.cobertura.xml
            ${{ env.TEST_RESULTS_DIR }}/**/coverage.opencover.xml
            ${{ env.TEST_RESULTS_DIR }}/coverage-report/Summary.json
            ${{ env.TEST_RESULTS_DIR }}/coverage-report/Summary.txt
            ${{ env.SONAR_REPORT_DIR }}/**
          if-no-files-found: warn
          retention-days: 7
