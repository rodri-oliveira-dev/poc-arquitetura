name: smoke-load-tests

on:
  workflow_dispatch:
    inputs:
      include-transfer-fullstack-kafka:
        description: Run TransferService full-stack Kafka smoke
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./LedgerService.slnx
  K6_ARTIFACTS_DIR: ./artifacts/k6

jobs:
  smoke:
    name: Run smoke load tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Start local stack and apply migrations
        run: bash ./scripts/start-local-stack.sh

      - name: Wait for APIs
        shell: bash
        run: |
          for url in \
            http://localhost:5226/health \
            http://localhost:5228/health \
            http://localhost:5230/health
          do
            for i in {1..30}; do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "API indisponivel: $url" >&2
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run k6 smoke load tests
        run: bash ./scripts/run-loadtests.sh smoke

      - name: Run TransferService API smoke tests
        run: bash ./scripts/run-loadtests.sh transfer-smoke

      - name: Start Kafka stack for TransferService full-stack smoke
        if: ${{ inputs.include-transfer-fullstack-kafka == 'true' }}
        run: bash ./scripts/start-local-stack-kafka.sh

      - name: Run TransferService full-stack Kafka smoke test
        if: ${{ inputs.include-transfer-fullstack-kafka == 'true' }}
        run: bash ./scripts/run-loadtests.sh transfer-fullstack-kafka

      - name: List k6 summaries
        if: ${{ always() }}
        shell: bash
        run: |
          find "$K6_ARTIFACTS_DIR" -maxdepth 1 -type f -name 'summary-*.json' -print | sort || true

      - name: Upload k6 summaries
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: k6-smoke-summaries
          path: ${{ env.K6_ARTIFACTS_DIR }}/summary-*.json
          if-no-files-found: warn
          retention-days: 3

      - name: Stop local stack
        if: ${{ always() }}
        run: docker compose -f compose.yaml down --volumes --remove-orphans
