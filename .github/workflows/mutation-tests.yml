name: mutation-tests

on:
  workflow_run:
    workflows: ["main-dotnet-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./PocArquitetura.slnx

jobs:
  mutation-tests:
    name: Run mutation tests
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: >
          dotnet build "$SOLUTION_PATH"
          --configuration "$BUILD_CONFIGURATION"
          --no-restore

      - name: Run Stryker - LedgerService.Application
        working-directory: tests/ledger/LedgerService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - LedgerService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-ledger-service-application
          path: tests/ledger/LedgerService.UnitTests/StrykerOutput/**/reports/mutation-report.html
          if-no-files-found: warn
          retention-days: 7

      - name: Run Stryker - BalanceService.Application
        working-directory: tests/balance/BalanceService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - BalanceService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-balance-service-application
          path: tests/balance/BalanceService.UnitTests/StrykerOutput/**/reports/mutation-report.html
          if-no-files-found: warn
          retention-days: 7

      - name: Publish mutation testing summary
        if: ${{ always() }}
        run: |
          {
            echo "## Resumo do mutation testing"
            echo ""
            echo "Esta execucao e informativa e nao bloqueia merge ou release."
            echo "Mutation score e consultivo; falhas de restore, build ou execucao operacional do Stryker continuam visiveis como falha do workflow."
            echo ""
            echo "Relatorios disponiveis nos artefatos do workflow:"
            echo "- stryker-ledger-service-application"
            echo "- stryker-balance-service-application"
          } >> "$GITHUB_STEP_SUMMARY"
