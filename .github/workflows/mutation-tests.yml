name: Mutation Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./LedgerService.slnx
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  mutation-tests:
    name: Run mutation tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json', 'dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Run Stryker - LedgerService.Application
        continue-on-error: true
        working-directory: tests/LedgerService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - LedgerService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: stryker-ledger-service-application
          path: tests/LedgerService.UnitTests/StrykerOutput/
          if-no-files-found: warn
          retention-days: 14

      - name: Run Stryker - BalanceService.Application
        continue-on-error: true
        working-directory: tests/BalanceService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - BalanceService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: stryker-balance-service-application
          path: tests/BalanceService.UnitTests/StrykerOutput/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish mutation testing summary
        if: ${{ always() }}
        run: |
          echo "## Mutation Testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Esta execucao e informativa e nao bloqueia merge ou release." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Relatorios disponiveis nos artifacts do workflow:" >> "$GITHUB_STEP_SUMMARY"
          echo "- stryker-ledger-service-application" >> "$GITHUB_STEP_SUMMARY"
          echo "- stryker-balance-service-application" >> "$GITHUB_STEP_SUMMARY"
