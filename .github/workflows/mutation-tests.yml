name: mutation-tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.sln"
      - "*.slnx"
      - "**/*.csproj"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "global.json"
      - "dotnet-tools.json"
      - ".config/dotnet-tools.json"
      - "coverlet.runsettings"
      - "**/stryker-config.json"
      - ".github/actions/setup-dotnet/**"
      - ".github/workflows/mutation-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./LedgerService.slnx

jobs:
  mutation-tests:
    name: Run mutation tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Run Stryker - LedgerService.Application
        continue-on-error: true
        working-directory: tests/LedgerService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - LedgerService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-ledger-service-application
          path: tests/LedgerService.UnitTests/StrykerOutput/**/reports/mutation-report.html
          if-no-files-found: warn
          retention-days: 7

      - name: Run Stryker - BalanceService.Application
        continue-on-error: true
        working-directory: tests/BalanceService.UnitTests
        run: dotnet stryker

      - name: Upload Stryker report - BalanceService.Application
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-balance-service-application
          path: tests/BalanceService.UnitTests/StrykerOutput/**/reports/mutation-report.html
          if-no-files-found: warn
          retention-days: 7

      - name: Publish mutation testing summary
        if: ${{ always() }}
        run: |
          echo "## Resumo do mutation testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Esta execucao e informativa e nao bloqueia merge ou release." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Relatorios disponiveis nos artefatos do workflow:" >> "$GITHUB_STEP_SUMMARY"
          echo "- stryker-ledger-service-application" >> "$GITHUB_STEP_SUMMARY"
          echo "- stryker-balance-service-application" >> "$GITHUB_STEP_SUMMARY"
