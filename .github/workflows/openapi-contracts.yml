name: openapi-contract-validation

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "!src/Shared/**"
      - "src/Shared/ApiDefaults/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "LedgerService.slnx"
      - ".config/dotnet-tools.json"
      - "package.json"
      - "package-lock.json"
      - "redocly.yaml"
      - "scripts/contracts/openapi/generate.*"
      - "scripts/contracts/openapi/check-breaking-changes.sh"
      - "docs/openapi/**"
      - ".github/actions/setup-dotnet/**"
      - ".github/actions/setup-node/**"
      - ".github/workflows/openapi-contracts.yml"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "!src/Shared/**"
      - "src/Shared/ApiDefaults/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "LedgerService.slnx"
      - ".config/dotnet-tools.json"
      - "package.json"
      - "package-lock.json"
      - "redocly.yaml"
      - "scripts/contracts/openapi/generate.*"
      - "scripts/contracts/openapi/check-breaking-changes.sh"
      - "docs/openapi/**"
      - ".github/actions/setup-dotnet/**"
      - ".github/actions/setup-node/**"
      - ".github/workflows/openapi-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./LedgerService.slnx
  OASDIFF_VERSION: "1.18.4"
  OASDIFF_LINUX_AMD64_SHA256: "ad148d8781e06276c3003b00b86bc87f4d57e6e9f912b05ac982b9731565b309"

jobs:
  validate:
    name: Validate OpenAPI contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Generate OpenAPI contracts
        run: bash ./scripts/contracts/openapi/generate.sh

      - name: Lint OpenAPI contracts
        run: npm run openapi:lint

      - name: Fetch main OpenAPI contracts
        id: main_openapi_contracts
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          git fetch --depth=1 origin "${{ github.base_ref }}"
          mkdir -p .openapi-main

          fetched_contracts=()
          missing_contracts=()
          for contract in ledger.v1.json balance.v1.json transfer.v1.json identity.v1.json; do
            source_ref="origin/${{ github.base_ref }}:docs/openapi/${contract}"
            if git cat-file -e "$source_ref"; then
              git show "$source_ref" > ".openapi-main/${contract}"
              fetched_contracts+=("$contract")
            else
              missing_contracts+=("$contract")
              echo "::notice::OpenAPI baseline docs/openapi/${contract} does not exist on ${{ github.base_ref }}. Breaking-change diff will be skipped for this initial baseline."
            fi
          done

          if [ "${#fetched_contracts[@]}" -gt 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            if [ "${#missing_contracts[@]}" -gt 0 ]; then
              {
                echo "## OpenAPI breaking change diff"
                echo
                echo "Alguns contratos ainda nao existem na \`${{ github.base_ref }}\` e serao tratados como baseline inicial."
                echo
                echo "Contratos ausentes na base:"
                printf -- "- \`docs/openapi/%s\`\n" "${missing_contracts[@]}"
                echo
                echo "Contratos existentes na base continuam protegidos contra breaking changes:"
                printf -- "- \`docs/openapi/%s\`\n" "${fetched_contracts[@]}"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## OpenAPI breaking change diff"
              echo
              echo "Comparacao contra a \`${{ github.base_ref }}\` ignorada porque a branch base ainda nao possui contratos OpenAPI versionados."
              echo
              echo "Contratos ausentes na base:"
              printf -- "- \`docs/openapi/%s\`\n" "${missing_contracts[@]}"
              echo
              echo "Este PR passa a ser tratado como baseline inicial; o workflow ainda gera, linta e valida drift dos contratos deste PR."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install oasdiff
        if: ${{ github.event_name == 'pull_request' && steps.main_openapi_contracts.outputs.available == 'true' }}
        shell: bash
        run: |
          archive="oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/${archive}"
          echo "${OASDIFF_LINUX_AMD64_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "$archive" oasdiff
          sudo install -m 0755 oasdiff /usr/local/bin/oasdiff
          command -v oasdiff
          oasdiff --help >/dev/null

      - name: Detect breaking OpenAPI changes
        if: ${{ github.event_name == 'pull_request' && steps.main_openapi_contracts.outputs.available == 'true' }}
        run: npm run openapi:diff

      - name: Record skipped OpenAPI diff
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          {
            echo "## OpenAPI breaking change diff"
            echo
            echo "Comparacao contra a main ignorada para \`${{ github.event_name }}\`."
            echo "Este workflow gera, linta e valida drift dos contratos neste evento."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate generated contract drift
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          OPENAPI_BASELINE_AVAILABLE: ${{ steps.main_openapi_contracts.outputs.available }}
        run: |
          if ! git diff --exit-code -- docs/openapi; then
            if [ "$EVENT_NAME" = "pull_request" ] && [ "$OPENAPI_BASELINE_AVAILABLE" != "true" ]; then
              echo "::warning::OpenAPI contracts changed after generation, but this pull request is creating the initial baseline. Drift is reported without blocking this run."
              {
                echo "## OpenAPI generated contract drift"
                echo
                echo "Drift detectado depois da geracao, mas tratado como informativo porque a branch base ainda nao possui todos os contratos OpenAPI versionados."
                echo
                echo "Arquivos alterados pela geracao:"
                git diff --name-status -- docs/openapi | sed 's/^/- `/' | sed 's/$/`/'
                echo
                echo "Depois que o baseline entrar na \`${{ github.base_ref }}\`, drift em pull requests volta a ser bloqueante."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "::error::OpenAPI contracts are out of date. Run bash ./scripts/contracts/openapi/generate.sh and commit the updated files in docs/openapi."
            exit 1
          fi

      - name: Upload OpenAPI contracts
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openapi-contracts
          path: docs/openapi/**
          if-no-files-found: warn
          retention-days: 7
