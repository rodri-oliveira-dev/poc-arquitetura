name: owasp-zap-baseline

on:
  workflow_run:
    workflows: ["main-dotnet-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      fail_on_alerts:
        description: "Falhar o job quando o ZAP retornar alertas"
        required: false
        default: false
        type: boolean
      active_scan:
        description: "Executar active scan nas APIs efemeras"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  SOLUTION_PATH: ./PocArquitetura.slnx
  ZAP_ARTIFACTS_DIR: ./artifacts/zap

jobs:
  zap-baseline:
    name: OWASP ZAP all APIs
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Prepare ephemeral CI environment
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/local/create-env-local.sh \
            --force \
            --output .env.ci
      - name: Run local OWASP ZAP orchestration
        id: zap_run
        continue-on-error: true
        shell: bash
        env:
          FAIL_ON_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}
          ACTIVE_SCAN: ${{ github.event_name == 'workflow_dispatch' && inputs.active_scan }}
        run: |
          set -euo pipefail

          args=(
            --env-file .env.ci
            --output-root "$ZAP_ARTIFACTS_DIR"
          )

          if [ "$ACTIVE_SCAN" = "true" ]; then
            args+=(--active-scan)
          fi

          if [ "$FAIL_ON_ALERTS" = "true" ]; then
            args+=(--fail-on-alerts)
          fi

          bash ./scripts/security/run-owasp-zap-local.sh "${args[@]}"

      - name: Validate authenticated ZAP coverage
        if: ${{ always() }}
        shell: bash
        env:
          FAIL_ON_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}
        run: |
          args=(
            --reports-root "$ZAP_ARTIFACTS_DIR"
            --summary-output "$ZAP_ARTIFACTS_DIR/authenticated-coverage-summary.md"
          )

          if [ "$FAIL_ON_ALERTS" = "true" ]; then
            args+=(--fail-on-alerts)
          fi

          python3 ./scripts/security/validate-zap-coverage.py "${args[@]}"

      - name: Write ZAP summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## OWASP ZAP all APIs"
            echo
            echo "- Sem API Gateway: cada microservico e analisado diretamente pela rede Compose."
            echo "- Alvos: Ledger, Balance, Transfer, Payment, Audit e Identity."
            echo "- Scan autenticado com o client local poc-automation."
            echo "- Todas as operacoes HTTP documentadas em cada OpenAPI sao importadas."
            echo "- Active scan: \`${{ github.event_name == 'workflow_dispatch' && inputs.active_scan }}\`."
            echo "- Fail on alerts: \`${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}\`."
            echo "- Preflight autenticado: executado por \`scripts/security/run-owasp-zap-local.sh\`."
            echo "- Gate de cobertura autenticada: executado por \`scripts/security/validate-zap-coverage.py\`."
            echo "- Artifact: \`owasp-zap-all-api-reports\`."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          latest_summary="$(find "$ZAP_ARTIFACTS_DIR" -type f -name summary.md -print 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$latest_summary" ]; then
            cat "$latest_summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo ZAP nao encontrado. Verifique logs e artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi

          coverage_summary="$(find "$ZAP_ARTIFACTS_DIR" -type f -name authenticated-coverage-summary.md -print 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$coverage_summary" ]; then
            cat "$coverage_summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo de cobertura autenticada nao encontrado." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload ZAP reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: owasp-zap-all-api-reports
          path: |
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.html
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.json
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.md
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.txt
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop controlled HTTP stack
        if: ${{ always() }}
        shell: bash
        run: |
          set +e

          if [ -f .env.ci ]; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              down --volumes --remove-orphans

            cleanup_exit_code=$?

            if [ "$cleanup_exit_code" -ne 0 ]; then
              echo "::warning::Falha ao encerrar o ambiente Docker Compose. Exit code: $cleanup_exit_code"
            fi
          else
            echo "Arquivo .env.ci não foi criado; cleanup do Compose ignorado."
          fi

          rm -f .env.ci
          exit 0

      - name: Fail on ZAP orchestration failure
        if: ${{ always() && steps.zap_run.outcome == 'failure' }}
        shell: bash
        run: exit 1
