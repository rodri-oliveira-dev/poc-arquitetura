name: owasp-zap-baseline

on:
  workflow_run:
    workflows: ["main-dotnet-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      fail_on_alerts:
        description: "Falhar o job quando o ZAP retornar alertas"
        required: false
        default: false
        type: boolean
      active_scan:
        description: "Executar active scan nas APIs efemeras"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  SOLUTION_PATH: ./PocArquitetura.slnx
  ZAP_ARTIFACTS_DIR: ./artifacts/zap

jobs:
  zap-baseline:
    name: OWASP ZAP all APIs
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Prepare Compose CI environment
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/local/create-env-local.sh \
            --force \
            --output .env.ci

          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            config --quiet

          # shellcheck source=/dev/null
          source ./scripts/lib/common.sh

          required_keys=(
            POSTGRES_HOST_PORT
            LEDGER_DB_MIGRATOR_PASSWORD
            BALANCE_DB_MIGRATOR_PASSWORD
            TRANSFER_DB_MIGRATOR_PASSWORD
            PAYMENT_DB_MIGRATOR_PASSWORD
            AUDIT_DB_MIGRATOR_PASSWORD
            IDENTITY_DB_MIGRATOR_PASSWORD
            KEYCLOAK_CLIENT_SECRET
          )

          for key in "${required_keys[@]}"; do
            value="$(read_env_value .env.ci "$key")"
            if [ -z "$value" ]; then
              echo "Variavel obrigatoria nao encontrada em .env.ci: $key" >&2
              exit 1
            fi

            if [ "$key" != "POSTGRES_HOST_PORT" ]; then
              echo "::add-mask::$value"
            fi

            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          done

      - name: Start controlled HTTP stack dependencies
        shell: bash
        run: |
          set -euo pipefail

          if ! docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            up -d postgres-db keycloak mailpit keycloak-identity-admin-init; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              ps
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              logs --no-color postgres-db keycloak mailpit keycloak-identity-admin-init || true
            exit 1
          fi

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          for _ in {1..60}; do
            if docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              exec -T postgres-db \
              pg_isready -U postgres_admin -d appdb >/dev/null 2>&1; then
              exit 0
            fi

            sleep 2
          done

          echo "PostgreSQL indisponivel apos timeout." >&2
          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            logs --no-color postgres-db
          exit 1

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail

          run_migration() {
            local connection_string="$1"
            local project="$2"
            local startup_project="$3"
            local db_context="$4"
            local connection_string_env="${5:-ConnectionStrings__DefaultConnection}"

            env \
              ConnectionStrings__DefaultConnection="$connection_string" \
              "$connection_string_env=$connection_string" \
              dotnet tool run dotnet-ef -- database update \
                -p "$project" \
                -s "$startup_project" \
                -c "$db_context" \
                -- --environment Development
          }

          postgres_connection_prefix="Host=127.0.0.1;Port=${POSTGRES_HOST_PORT:-15432};Database=appdb"

          run_migration \
            "$postgres_connection_prefix;Username=ledger_migrator_user;Password=$LEDGER_DB_MIGRATOR_PASSWORD" \
            src/ledger/LedgerService.Infrastructure/LedgerService.Infrastructure.csproj \
            src/ledger/LedgerService.Api/LedgerService.Api.csproj \
            AppDbContext

          run_migration \
            "$postgres_connection_prefix;Username=balance_migrator_user;Password=$BALANCE_DB_MIGRATOR_PASSWORD" \
            src/balance/BalanceService.Infrastructure/BalanceService.Infrastructure.csproj \
            src/balance/BalanceService.Api/BalanceService.Api.csproj \
            BalanceDbContext

          run_migration \
            "$postgres_connection_prefix;Username=transfer_migrator_user;Password=$TRANSFER_DB_MIGRATOR_PASSWORD" \
            src/transfer/TransferService.Infrastructure/TransferService.Infrastructure.csproj \
            src/transfer/TransferService.Api/TransferService.Api.csproj \
            TransferServiceDbContext \
            TRANSFER_SERVICE_CONNECTION_STRING

          run_migration \
            "$postgres_connection_prefix;Username=payment_migrator_user;Password=$PAYMENT_DB_MIGRATOR_PASSWORD" \
            src/payment/PaymentService.Infrastructure/PaymentService.Infrastructure.csproj \
            src/payment/PaymentService.Api/PaymentService.Api.csproj \
            PaymentDbContext \
            PAYMENT_SERVICE_CONNECTION_STRING

          run_migration \
            "$postgres_connection_prefix;Username=audit_migrator_user;Password=$AUDIT_DB_MIGRATOR_PASSWORD" \
            src/audit/AuditService.Infrastructure/AuditService.Infrastructure.csproj \
            src/audit/AuditService.Infrastructure/AuditService.Infrastructure.csproj \
            AuditDbContext \
            AUDIT_SERVICE_CONNECTION_STRING

          run_migration \
            "$postgres_connection_prefix;Username=identity_migrator_user;Password=$IDENTITY_DB_MIGRATOR_PASSWORD" \
            src/identity/IdentityService.Infrastructure/IdentityService.Infrastructure.csproj \
            src/identity/IdentityService.Infrastructure/IdentityService.Infrastructure.csproj \
            IdentityDbContext \
            IDENTITY_SERVICE_CONNECTION_STRING

      - name: Start all HTTP APIs
        shell: bash
        run: |
          set -euo pipefail

          if ! docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            up -d --build \
            ledger-service \
            balance-service \
            transfer-service \
            payment-service \
            audit-service \
            identity-service; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              ps
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              logs --no-color \
              ledger-service \
              balance-service \
              transfer-service \
              payment-service \
              audit-service \
              identity-service || true
            exit 1
          fi

      - name: Wait for all APIs
        shell: bash
        run: |
          set -euo pipefail

          targets=(
            "LedgerService.Api|http://localhost:5226/health"
            "BalanceService.Api|http://localhost:5228/health"
            "TransferService.Api|http://localhost:5230/health"
            "IdentityService.Api|http://localhost:5232/health"
            "PaymentService.Api|http://localhost:5234/health"
            "AuditService.Api|http://localhost:5235/health"
          )

          for target in "${targets[@]}"; do
            IFS='|' read -r name url <<<"$target"
            for attempt in {1..90}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$name disponivel em $url"
                break
              fi

              if [ "$attempt" -eq 90 ]; then
                echo "API indisponivel: $name ($url)" >&2
                docker compose \
                  --env-file .env.ci \
                  -f compose.yaml \
                  -f compose.owasp-zap.yaml \
                  ps
                docker compose \
                  --env-file .env.ci \
                  -f compose.yaml \
                  -f compose.owasp-zap.yaml \
                  logs --no-color \
                  ledger-service \
                  balance-service \
                  transfer-service \
                  payment-service \
                  audit-service \
                  identity-service || true
                exit 1
              fi

              sleep 2
            done
          done

      - name: Run authenticated OWASP ZAP against all APIs
        shell: bash
        env:
          FAIL_ON_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}
          ACTIVE_SCAN: ${{ github.event_name == 'workflow_dispatch' && inputs.active_scan }}
        run: |
          set -euo pipefail

          mkdir -p "$ZAP_ARTIFACTS_DIR"

          api_services=(
            ledger-service
            balance-service
            transfer-service
            payment-service
            audit-service
            identity-service
          )

          first_container_id="$(
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              ps -q "${api_services[0]}"
          )"

          if [ -z "$first_container_id" ]; then
            echo "Nao foi possivel descobrir o container ${api_services[0]}." >&2
            exit 1
          fi

          api_network="$(
            docker inspect "$first_container_id" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' |
              awk '/(^|_)poc-net$/ { print; exit }'
          )"

          if [ -z "$api_network" ]; then
            echo "Rede poc-net nao encontrada no container ${api_services[0]}." >&2
            exit 1
          fi

          for service in "${api_services[@]}"; do
            container_id="$(
              docker compose \
                --env-file .env.ci \
                -f compose.yaml \
                -f compose.owasp-zap.yaml \
                ps -q "$service"
            )"

            if [ -z "$container_id" ]; then
              echo "Container da API nao encontrado: $service" >&2
              exit 1
            fi

            if ! docker inspect "$container_id" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' |
              grep -Fx "$api_network" >/dev/null; then
              echo "$service nao esta conectado a rede Docker $api_network." >&2
              exit 1
            fi
          done

          args=(
            --output-root "$ZAP_ARTIFACTS_DIR"
            --docker-network "$api_network"
            --env-file "$GITHUB_WORKSPACE/.env.ci"
            --use-authentication
            --targets-file ./scripts/security/owasp-zap-ci-targets.txt
          )

          if [ "$ACTIVE_SCAN" = "true" ]; then
            args+=(--active-scan)
          fi

          if [ "$FAIL_ON_ALERTS" = "true" ]; then
            args+=(--fail-on-alerts)
          fi

          bash ./scripts/security/run-owasp-zap-all-apis.sh "${args[@]}"

      - name: Write ZAP summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## OWASP ZAP all APIs"
            echo
            echo "- Sem API Gateway: cada microservico e analisado diretamente pela rede Compose."
            echo "- Alvos: Ledger, Balance, Transfer, Payment, Audit e Identity."
            echo "- Scan autenticado com o client local poc-automation."
            echo "- Todas as operacoes HTTP documentadas em cada OpenAPI sao importadas."
            echo "- Active scan permanece desabilitado na execucao automatica."
            echo "- Alerts so falham o job em execucao manual com fail_on_alerts=true."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          latest_summary="$(find "$ZAP_ARTIFACTS_DIR" -type f -name summary.md -print 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$latest_summary" ]; then
            cat "$latest_summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo ZAP nao encontrado. Verifique logs e artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload ZAP reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: owasp-zap-all-api-reports
          path: |
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.html
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.json
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.md
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.txt
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop controlled HTTP stack
        if: ${{ always() }}
        shell: bash
        run: |
          set +e

          if [ -f .env.ci ]; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              down --volumes --remove-orphans

            cleanup_exit_code=$?

            if [ "$cleanup_exit_code" -ne 0 ]; then
              echo "::warning::Falha ao encerrar o ambiente Docker Compose. Exit code: $cleanup_exit_code"
            fi
          else
            echo "Arquivo .env.ci não foi criado; cleanup do Compose ignorado."
          fi

          rm -f .env.ci
          exit 0
