name: owasp-zap-baseline

on:
  workflow_run:
    workflows: ["main-dotnet-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      fail_on_alerts:
        description: "Falhar o job quando o ZAP retornar alertas"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  SOLUTION_PATH: ./PocArquitetura.slnx
  ZAP_ARTIFACTS_DIR: ./artifacts/zap

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Prepare Compose CI environment
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/local/create-env-local.sh \
            --force \
            --output .env.ci

          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            config --quiet

          # shellcheck source=/dev/null
          source ./scripts/lib/common.sh

          required_values=(
            LEDGER_DB_MIGRATOR_PASSWORD
            BALANCE_DB_MIGRATOR_PASSWORD
            TRANSFER_DB_MIGRATOR_PASSWORD
            PAYMENT_DB_MIGRATOR_PASSWORD
            AUDIT_DB_MIGRATOR_PASSWORD
            IDENTITY_DB_MIGRATOR_PASSWORD
            KEYCLOAK_CLIENT_SECRET
            POSTGRES_HOST_PORT
          )

          for key in "${required_values[@]}"; do
            value="$(read_env_value .env.ci "$key")"
            if [ -z "$value" ]; then
              echo "Variavel obrigatoria nao encontrada em .env.ci: $key" >&2
              exit 1
            fi

            if [[ "$key" == *PASSWORD || "$key" == *SECRET ]]; then
              echo "::add-mask::$value"
            fi

            echo "$key=$value" >> "$GITHUB_ENV"
          done

      - name: Start controlled HTTP stack dependencies
        shell: bash
        run: |
          set -euo pipefail

          if ! docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            up -d --build postgres-db keycloak mailpit; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              ps
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              logs --no-color postgres-db keycloak mailpit
            exit 1
          fi

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -euo pipefail

          for _ in {1..60}; do
            if docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              exec -T postgres-db \
              pg_isready -U postgres_admin -d appdb >/dev/null 2>&1; then
              exit 0
            fi

            sleep 2
          done

          echo "PostgreSQL indisponivel apos timeout." >&2
          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            logs --no-color postgres-db
          exit 1

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail

          run_migration() {
            local username="$1"
            local password="$2"
            local project="$3"
            local startup_project="$4"
            local db_context="$5"
            local connection_string_env="${6:-ConnectionStrings__DefaultConnection}"
            local connection_string="Host=127.0.0.1;Port=${POSTGRES_HOST_PORT:-15432};Database=appdb;Username=$username;Password=$password"

            env \
              ConnectionStrings__DefaultConnection="$connection_string" \
              "$connection_string_env=$connection_string" \
              dotnet tool run dotnet-ef -- database update \
                -p "$project" \
                -s "$startup_project" \
                -c "$db_context" \
                -- --environment Development
          }

          run_migration \
            ledger_migrator_user \
            "$LEDGER_DB_MIGRATOR_PASSWORD" \
            src/ledger/LedgerService.Infrastructure/LedgerService.Infrastructure.csproj \
            src/ledger/LedgerService.Api/LedgerService.Api.csproj \
            AppDbContext

          run_migration \
            balance_migrator_user \
            "$BALANCE_DB_MIGRATOR_PASSWORD" \
            src/balance/BalanceService.Infrastructure/BalanceService.Infrastructure.csproj \
            src/balance/BalanceService.Api/BalanceService.Api.csproj \
            BalanceDbContext

          run_migration \
            transfer_migrator_user \
            "$TRANSFER_DB_MIGRATOR_PASSWORD" \
            src/transfer/TransferService.Infrastructure/TransferService.Infrastructure.csproj \
            src/transfer/TransferService.Api/TransferService.Api.csproj \
            TransferServiceDbContext \
            TRANSFER_SERVICE_CONNECTION_STRING

          run_migration \
            payment_migrator_user \
            "$PAYMENT_DB_MIGRATOR_PASSWORD" \
            src/payment/PaymentService.Infrastructure/PaymentService.Infrastructure.csproj \
            src/payment/PaymentService.Api/PaymentService.Api.csproj \
            PaymentDbContext \
            PAYMENT_SERVICE_CONNECTION_STRING

          run_migration \
            audit_migrator_user \
            "$AUDIT_DB_MIGRATOR_PASSWORD" \
            src/audit/AuditService.Infrastructure/AuditService.Infrastructure.csproj \
            src/audit/AuditService.Infrastructure/AuditService.Infrastructure.csproj \
            AuditDbContext \
            AUDIT_SERVICE_CONNECTION_STRING

          run_migration \
            identity_migrator_user \
            "$IDENTITY_DB_MIGRATOR_PASSWORD" \
            src/identity/IdentityService.Infrastructure/IdentityService.Infrastructure.csproj \
            src/identity/IdentityService.Infrastructure/IdentityService.Infrastructure.csproj \
            IdentityDbContext \
            IDENTITY_SERVICE_CONNECTION_STRING

      - name: Start APIs
        shell: bash
        run: |
          set -euo pipefail

          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            -f compose.owasp-zap.yaml \
            up -d --build \
              ledger-service \
              balance-service \
              transfer-service \
              payment-service \
              audit-service \
              identity-service

      - name: Wait for APIs
        shell: bash
        run: |
          set -euo pipefail

          api_urls=(
            http://localhost:5226/health
            http://localhost:5228/health
            http://localhost:5230/health
            http://localhost:5234/health
            http://localhost:5235/health
            http://localhost:5232/health
          )

          for url in "${api_urls[@]}"; do
            for attempt in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                break
              fi

              if [ "$attempt" -eq 60 ]; then
                echo "API indisponivel: $url" >&2
                docker compose \
                  --env-file .env.ci \
                  -f compose.yaml \
                  -f compose.owasp-zap.yaml \
                  ps
                docker compose \
                  --env-file .env.ci \
                  -f compose.yaml \
                  -f compose.owasp-zap.yaml \
                  logs --no-color \
                    ledger-service \
                    balance-service \
                    transfer-service \
                    payment-service \
                    audit-service \
                    identity-service
                exit 1
              fi

              sleep 2
            done
          done

      - name: Run OWASP ZAP baseline
        shell: bash
        env:
          FAIL_ON_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}
          ENV_FILE: ${{ github.workspace }}/.env.ci
        run: |
          set -euo pipefail

          mkdir -p "$ZAP_ARTIFACTS_DIR"

          ledger_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q ledger-service)"
          balance_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q balance-service)"
          transfer_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q transfer-service)"
          payment_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q payment-service)"
          audit_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q audit-service)"
          identity_container_id="$(docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps -q identity-service)"

          api_container_ids=(
            "$ledger_container_id"
            "$balance_container_id"
            "$transfer_container_id"
            "$payment_container_id"
            "$audit_container_id"
            "$identity_container_id"
          )

          for container_id in "${api_container_ids[@]}"; do
            if [ -z "$container_id" ]; then
              echo "Nao foi possivel descobrir todos os containers das APIs para o scan ZAP." >&2
              docker compose --env-file .env.ci -f compose.yaml -f compose.owasp-zap.yaml ps
              exit 1
            fi
          done

          ledger_networks="$(
            docker inspect "$ledger_container_id" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}'
          )"
          zap_network="$(printf '%s\n' "$ledger_networks" | awk '/(^|_)poc-net$/ { print; exit }')"

          if [ -z "$zap_network" ]; then
            echo "Rede poc-net nao encontrada no container ledger-service." >&2
            docker inspect "$ledger_container_id" --format '{{json .NetworkSettings.Networks}}'
            exit 1
          fi

          for container_id in "${api_container_ids[@]}"; do
            if ! docker inspect "$container_id" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' |
              grep -Fx "$zap_network" >/dev/null; then
              echo "Uma API nao esta conectada a rede Docker usada pelo ZAP: $zap_network" >&2
              docker inspect "$container_id" --format '{{json .NetworkSettings.Networks}}'
              exit 1
            fi
          done

          args=(
            --output-root "$ZAP_ARTIFACTS_DIR"
            --health-timeout 180
            --health-interval 5
            --docker-network "$zap_network"
            --use-authentication
            --ledger-url http://localhost:5226
            --balance-url http://localhost:5228
            --transfer-url http://localhost:5230
            --payment-url http://localhost:5234
            --audit-url http://localhost:5235
            --identity-url http://localhost:5232
            --ledger-zap-url http://ledger-service:8080
            --balance-zap-url http://balance-service:8080
            --transfer-zap-url http://transfer-service:8080
            --payment-zap-url http://payment-service:8080
            --audit-zap-url http://audit-service:8080
            --identity-zap-url http://identity-service:8080
          )

          if [ "$FAIL_ON_ALERTS" = "true" ]; then
            args+=(--fail-on-alerts)
          fi

          bash ./scripts/security/run-owasp-zap-all-apis.sh "${args[@]}"

      - name: Write ZAP summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## OWASP ZAP baseline"
            echo
            echo "- Execucao manual via workflow_dispatch ou automatica apos sucesso do main-dotnet-ci na main."
            echo "- Alvos: Ledger, Balance, Transfer, Payment, Audit e Identity."
            echo "- Cada API e analisada diretamente pelo proprio OpenAPI; nenhum gateway e utilizado."
            echo "- O scan usa Bearer Token do Keycloak local para alcancar endpoints protegidos."
            echo "- Alerts do ZAP so falham o job em execucao manual com fail_on_alerts=true."
            echo "- Falhas operacionais, OpenAPI vazio ou API ausente continuam falhando o job."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          latest_summary="$(find "$ZAP_ARTIFACTS_DIR" -type f -name summary.md -print 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$latest_summary" ]; then
            cat "$latest_summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo ZAP nao encontrado. Verifique logs e artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload ZAP reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: owasp-zap-baseline-reports
          path: |
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.html
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.json
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.md
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.txt
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop controlled HTTP stack
        if: ${{ always() }}
        shell: bash
        run: |
          set +e

          if [ -f .env.ci ]; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              -f compose.owasp-zap.yaml \
              down --volumes --remove-orphans

            cleanup_exit_code=$?
            if [ "$cleanup_exit_code" -ne 0 ]; then
              echo "::warning::Falha ao encerrar o ambiente Docker Compose. Exit code: $cleanup_exit_code"
            fi
          else
            echo "Arquivo .env.ci nao foi criado; cleanup do Compose ignorado."
          fi

          rm -f .env.ci
          exit 0
