name: owasp-zap-baseline

on:
  workflow_run:
    workflows: ["main-dotnet-ci"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      fail_on_alerts:
        description: "Falhar o job quando o ZAP retornar alertas"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  SOLUTION_PATH: ./PocArquitetura.slnx
  ZAP_ARTIFACTS_DIR: ./artifacts/zap

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          restore-tools: "true"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Prepare Compose CI environment
        shell: bash
        run: |
          set -euo pipefail

          bash ./scripts/local/create-env-local.sh \
            --force \
            --output .env.ci

          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            config --quiet

          # shellcheck source=/dev/null
          source ./scripts/lib/common.sh

          ledger_migrator_password="$(read_env_value .env.ci LEDGER_DB_MIGRATOR_PASSWORD)"
          balance_migrator_password="$(read_env_value .env.ci BALANCE_DB_MIGRATOR_PASSWORD)"
          postgres_host_port="$(read_env_value .env.ci POSTGRES_HOST_PORT)"

          if [ -z "$ledger_migrator_password" ] || [ -z "$balance_migrator_password" ] || [ -z "$postgres_host_port" ]; then
            echo "Variaveis obrigatorias nao encontradas em .env.ci." >&2
            exit 1
          fi

          echo "::add-mask::$ledger_migrator_password"
          echo "::add-mask::$balance_migrator_password"

          {
            echo "LEDGER_DB_MIGRATOR_PASSWORD=$ledger_migrator_password"
            echo "BALANCE_DB_MIGRATOR_PASSWORD=$balance_migrator_password"
            echo "POSTGRES_HOST_PORT=$postgres_host_port"
          } >> "$GITHUB_ENV"

      - name: Start controlled HTTP stack dependencies
        shell: bash
        run: |
          set -euo pipefail

          if ! docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            up -d --build postgres-db keycloak; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              ps
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              logs --no-color postgres-db keycloak || true
            exit 1
          fi

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          for _ in {1..60}; do
            if docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              exec -T postgres-db \
              pg_isready -U postgres_admin -d appdb >/dev/null 2>&1; then
              exit 0
            fi

            sleep 2
          done

          echo "PostgreSQL indisponivel apos timeout." >&2
          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            logs --no-color postgres-db
          exit 1

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail

          ConnectionStrings__DefaultConnection="Host=127.0.0.1;Port=${POSTGRES_HOST_PORT:-15432};Database=appdb;Username=ledger_migrator_user;Password=$LEDGER_DB_MIGRATOR_PASSWORD" \
            dotnet tool run dotnet-ef -- database update \
            -p src/ledger/LedgerService.Infrastructure/LedgerService.Infrastructure.csproj \
            -s src/ledger/LedgerService.Api/LedgerService.Api.csproj \
            -c AppDbContext \
            -- --environment Development

          ConnectionStrings__DefaultConnection="Host=127.0.0.1;Port=${POSTGRES_HOST_PORT:-15432};Database=appdb;Username=balance_migrator_user;Password=$BALANCE_DB_MIGRATOR_PASSWORD" \
            dotnet tool run dotnet-ef -- database update \
            -p src/balance/BalanceService.Infrastructure/BalanceService.Infrastructure.csproj \
            -s src/balance/BalanceService.Api/BalanceService.Api.csproj \
            -c BalanceDbContext \
            -- --environment Development

      - name: Start APIs
        shell: bash
        run: |
          set -euo pipefail

          docker compose \
            --env-file .env.ci \
            -f compose.yaml \
            up -d --build ledger-service balance-service

      - name: Wait for APIs
        shell: bash
        run: |
          for url in \
            http://localhost:5226/health \
            http://localhost:5228/health
          do
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                break
              fi

              if [ "$i" -eq 60 ]; then
                echo "API indisponivel: $url" >&2
                docker compose \
                  --env-file .env.ci \
                  -f compose.yaml \
                  logs --no-color ledger-service balance-service
                exit 1
              fi

              sleep 2
            done
          done

      - name: Run OWASP ZAP baseline
        shell: bash
        env:
          FAIL_ON_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_alerts }}
        run: |
          set -euo pipefail

          mkdir -p "$ZAP_ARTIFACTS_DIR"

          ledger_container_id="$(docker compose --env-file .env.ci -f compose.yaml ps -q ledger-service)"
          balance_container_id="$(docker compose --env-file .env.ci -f compose.yaml ps -q balance-service)"

          if [ -z "$ledger_container_id" ] || [ -z "$balance_container_id" ]; then
            echo "Nao foi possivel descobrir os containers das APIs para o scan ZAP." >&2
            docker compose --env-file .env.ci -f compose.yaml ps
            exit 1
          fi

          ledger_networks="$(
            docker inspect "$ledger_container_id" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}'
          )"
          zap_network="$(printf '%s\n' "$ledger_networks" | awk '/(^|_)poc-net$/ { print; exit }')"

          if [ -z "$zap_network" ]; then
            echo "Rede poc-net nao encontrada no container ledger-service." >&2
            docker inspect "$ledger_container_id" --format '{{json .NetworkSettings.Networks}}'
            exit 1
          fi

          if ! docker inspect "$balance_container_id" \
            --format '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' |
            grep -Fx "$zap_network" >/dev/null; then
            echo "balance-service nao esta conectado a rede Docker usada pelo Ledger: $zap_network" >&2
            docker inspect "$balance_container_id" --format '{{json .NetworkSettings.Networks}}'
            exit 1
          fi

          args=(
            --output-root "$ZAP_ARTIFACTS_DIR"
            --health-timeout 180
            --health-interval 5
            --docker-network "$zap_network"
            --ledger-zap-url http://ledger-service:8080
            --balance-zap-url http://balance-service:8080
          )

          if [ "$FAIL_ON_ALERTS" = "true" ]; then
            args+=(--fail-on-alerts)
          fi

          bash ./scripts/security/run-owasp-zap.sh "${args[@]}"

      - name: Write ZAP summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## OWASP ZAP baseline"
            echo
            echo "- Execucao manual via workflow_dispatch ou automatica apos sucesso do main-dotnet-ci na main."
            echo "- Alvos padrao: LedgerService.Api e BalanceService.Api."
            echo "- Alerts do ZAP so falham o job em execucao manual com fail_on_alerts=true."
            echo "- Falhas operacionais de Docker, migrations, build, timeout ou APIs indisponiveis continuam falhando o job."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          latest_summary="$(find "$ZAP_ARTIFACTS_DIR" -type f -name summary.md -print 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$latest_summary" ]; then
            cat "$latest_summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo ZAP nao encontrado. Verifique logs e artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload ZAP reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: owasp-zap-baseline-reports
          path: |
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.html
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.json
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.md
            ${{ env.ZAP_ARTIFACTS_DIR }}/**/*.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Stop controlled HTTP stack
        if: ${{ always() }}
        shell: bash
        run: |
          set +e

          if [ -f .env.ci ]; then
            docker compose \
              --env-file .env.ci \
              -f compose.yaml \
              down --volumes --remove-orphans

            cleanup_exit_code=$?

            if [ "$cleanup_exit_code" -ne 0 ]; then
              echo "::warning::Falha ao encerrar o ambiente Docker Compose. Exit code: $cleanup_exit_code"
            fi
          else
            echo "Arquivo .env.ci não foi criado; cleanup do Compose ignorado."
          fi

          rm -f .env.ci

          exit 0
