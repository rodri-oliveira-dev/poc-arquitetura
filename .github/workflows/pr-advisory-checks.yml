name: pr-advisory-checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  AGGREGATE_SOLUTION_PATH: ./PocArquitetura.slnx
  SHARED_SOLUTION_PATH: ./PocArquitetura.Shared.slnx

jobs:
  analyzer-recommendations:
    name: Run analyzer recommendations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          cache-key-prefix: nuget-analyzers

      - name: Detect changed files
        id: changed_files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[].filename' > changed-files.txt
          grep -E '\.cs$' changed-files.txt > changed-csharp-files.txt || true

          count="$(wc -l < changed-csharp-files.txt | tr -d ' ')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          run_aggregate=false
          run_shared=false

          while IFS= read -r file; do
            normalized="${file,,}"

            case "$normalized" in
              global.json|nuget.config|directory.build.props|directory.packages.props|test.sh|test.ps1|.github/actions/setup-dotnet/*|.github/workflows/*)
                run_aggregate=true
                run_shared=true
                ;;
              pocarquitetura.shared.slnx|src/shared/*|tests/shared/*)
                run_shared=true
                ;;
              pocarquitetura.slnx|auditservice.slnx|balanceservice.slnx|identityservice.slnx|ledgerservice.slnx|transferservice.slnx|src/audit/*|src/identity/*|src/balance/*|src/transfer/*|src/ledger/*|tests/audit/*|tests/identity/*|tests/balance/*|tests/transfer/*|tests/ledger/*|tests/architecture.tests/*)
                run_aggregate=true
                ;;
              *.cs)
                run_aggregate=true
                run_shared=true
                ;;
            esac
          done < changed-files.txt

          echo "run_aggregate=$run_aggregate" >> "$GITHUB_OUTPUT"
          echo "run_shared=$run_shared" >> "$GITHUB_OUTPUT"

          if [ "$count" -eq 0 ]; then
            echo "No changed C# files found in this PR." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Changed C# files"
              echo
              sed 's/^/- `/' changed-csharp-files.txt | sed 's/$/`/'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Restore aggregate dependencies
        if: ${{ steps.changed_files.outputs.run_aggregate == 'true' }}
        shell: bash
        run: dotnet restore "$AGGREGATE_SOLUTION_PATH"

      - name: Restore Shared dependencies
        if: ${{ steps.changed_files.outputs.run_shared == 'true' }}
        shell: bash
        run: dotnet restore "$SHARED_SOLUTION_PATH"

      - name: Run .NET analyzers as aggregate recommendations
        if: ${{ steps.changed_files.outputs.run_aggregate == 'true' }}
        id: aggregate_analyzers
        shell: bash
        run: |
          set +e

          dotnet build "$AGGREGATE_SOLUTION_PATH" \
            --configuration "$BUILD_CONFIGURATION" \
            --no-restore \
            /p:AnalysisMode=AllEnabledByDefault \
            /p:AnalysisLevel=latest \
            /p:EnforceCodeStyleInBuild=true \
            /p:TreatWarningsAsErrors=false \
            /warnaserror- \
            2>&1 | tee analyzer-output.log

          status="${PIPESTATUS[0]}"
          echo "build_exit_code=$status" >> "$GITHUB_OUTPUT"

          if [ "$status" -ne 0 ]; then
            echo "Analyzer build returned exit code $status. This workflow keeps the result advisory and does not fail the PR." >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0

      - name: Run .NET analyzers as Shared recommendations
        if: ${{ steps.changed_files.outputs.run_shared == 'true' }}
        id: shared_analyzers
        shell: bash
        run: |
          set +e

          dotnet build "$SHARED_SOLUTION_PATH" \
            --configuration "$BUILD_CONFIGURATION" \
            --no-restore \
            /p:AnalysisMode=AllEnabledByDefault \
            /p:AnalysisLevel=latest \
            /p:EnforceCodeStyleInBuild=true \
            /p:TreatWarningsAsErrors=false \
            /warnaserror- \
            2>&1 | tee -a analyzer-output.log

          status="${PIPESTATUS[0]}"
          echo "build_exit_code=$status" >> "$GITHUB_OUTPUT"

          if [ "$status" -ne 0 ]; then
            echo "Shared analyzer build returned exit code $status. This workflow keeps the result advisory and does not fail the PR." >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0

      - name: Publish analyzer recommendations
        if: ${{ (steps.changed_files.outputs.run_aggregate == 'true' || steps.changed_files.outputs.run_shared == 'true') && always() }}
        shell: bash
        run: |
          python - <<'PY'
          import html
          import os
          import re
          from pathlib import Path

          workspace = Path(os.environ.get("GITHUB_WORKSPACE", ".")).resolve()
          changed_file = Path("changed-csharp-files.txt")
          log_file = Path("analyzer-output.log")
          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])

          changed = set()
          if changed_file.exists():
              changed = {line.strip().replace("\\", "/") for line in changed_file.read_text(encoding="utf-8").splitlines() if line.strip()}

          diagnostics = []
          pattern = re.compile(r"^(?P<path>.*?\.cs)\((?P<line>\d+),(?P<column>\d+)\): warning (?P<code>[^:]+): (?P<message>.*?)(?: \[(?P<project>.*)\])?$")

          if log_file.exists():
              for raw in log_file.read_text(encoding="utf-8", errors="replace").splitlines():
                  match = pattern.match(raw.strip())
                  if not match:
                      continue

                  file_path = match.group("path").replace("\\", "/")
                  try:
                      rel_path = Path(file_path).resolve().relative_to(workspace).as_posix()
                  except Exception:
                      rel_path = file_path.lstrip("./")

                  if rel_path not in changed:
                      continue

                  diagnostics.append({
                      "file": rel_path,
                      "line": int(match.group("line")),
                      "column": int(match.group("column")),
                      "code": match.group("code").strip(),
                      "message": match.group("message").strip(),
                  })

          max_annotations = 50
          for diagnostic in diagnostics[:max_annotations]:
              message = diagnostic["message"].replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              title = f"Analyzer {diagnostic['code']}".replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(
                  f"::warning file={diagnostic['file']},line={diagnostic['line']},col={diagnostic['column']},title={title}::{message}"
              )

          with summary_file.open("a", encoding="utf-8") as summary:
              summary.write("\n### Analyzer recommendations\n\n")
              summary.write("These findings are advisory only. They do not block the pull request.\n\n")

              if not diagnostics:
                  summary.write("No analyzer warnings were found in the C# files changed by this pull request.\n")
              else:
                  summary.write(f"Found {len(diagnostics)} analyzer warning(s) in changed C# files.\n\n")
                  summary.write("| File | Line | Rule | Recommendation |\n")
                  summary.write("| --- | ---: | --- | --- |\n")
                  for diagnostic in diagnostics[:100]:
                      file_name = html.escape(diagnostic["file"])
                      rule = html.escape(diagnostic["code"])
                      message = html.escape(diagnostic["message"])
                      summary.write(f"| `{file_name}` | {diagnostic['line']} | `{rule}` | {message} |\n")

                  if len(diagnostics) > 100:
                      summary.write(f"\nOnly the first 100 findings were listed in the summary. Total findings: {len(diagnostics)}.\n")

                  if len(diagnostics) > max_annotations:
                      summary.write(f"\nOnly the first {max_annotations} findings were emitted as GitHub annotations.\n")
          PY
