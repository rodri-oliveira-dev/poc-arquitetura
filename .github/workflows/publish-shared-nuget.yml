name: publish-shared-nuget

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/Shared/**"
      - "tests/Shared/**"
      - "PocArquitetura.Shared.slnx"
      - "GitVersion.yml"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "src/Shared/Directory.Build.props"
      - "src/Shared/Directory.Packages.props"
      - ".github/workflows/publish-shared-nuget.yml"
      - "LICENSE"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: PocArquitetura.Shared.slnx
  PACKAGE_OUTPUT_DIR: artifacts/packages

jobs:
  pack-shared:
    name: Build, test and pack Shared NuGet packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install GitVersion.Tool
        run: dotnet tool restore

      - name: Calculate package version
        shell: bash
        run: |
          set -euo pipefail

          raw_package_version="$(dotnet tool run dotnet-gitversion /showvariable SemVer)"
          package_version="$raw_package_version"

          if [[ "$package_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}-main.${BASH_REMATCH[2]}"
          fi

          if [ -z "$package_version" ]; then
            echo "GitVersion did not calculate a NuGet package version." >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "GitVersion SemVer: $raw_package_version"
          echo "Package version: $package_version"

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH -c $BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test $SOLUTION_PATH -c $BUILD_CONFIGURATION --no-build

      - name: Pack HttpResilienceDefaults
        run: >
          dotnet pack src/Shared/HttpResilienceDefaults/HttpResilienceDefaults.csproj
          -c $BUILD_CONFIGURATION
          --no-build
          --output $PACKAGE_OUTPUT_DIR
          /p:PackageVersion=$PACKAGE_VERSION

      - name: Pack ApplicationDefaults
        run: >
          dotnet pack src/Shared/ApplicationDefaults/ApplicationDefaults.csproj
          -c $BUILD_CONFIGURATION
          --no-build
          --output $PACKAGE_OUTPUT_DIR
          /p:PackageVersion=$PACKAGE_VERSION

      - name: Pack ApiDefaults
        run: >
          dotnet pack src/Shared/ApiDefaults/ApiDefaults.csproj
          -c $BUILD_CONFIGURATION
          --no-build
          --output $PACKAGE_OUTPUT_DIR
          /p:PackageVersion=$PACKAGE_VERSION

      - name: Validate generated packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $expectedPackages = @(
            @{
              Id = "PocArquitetura.HttpResilienceDefaults"
              Tags = @("dotnet", "httpclient", "resilience", "polly", "observability", "microservices")
              Dependencies = @()
            },
            @{
              Id = "PocArquitetura.ApplicationDefaults"
              Tags = @("dotnet", "application", "mediatr", "fluentvalidation", "clean-architecture")
              Dependencies = @()
            },
            @{
              Id = "PocArquitetura.ApiDefaults"
              Tags = @("dotnet", "aspnetcore", "api", "swagger", "opentelemetry", "jwt", "microservices")
              Dependencies = @("PocArquitetura.HttpResilienceDefaults")
            }
          )

          $packageFiles = Get-ChildItem -Path $env:PACKAGE_OUTPUT_DIR -Filter "*.nupkg" -File
          if ($packageFiles.Count -ne $expectedPackages.Count) {
            $found = ($packageFiles.Name -join ", ")
            throw "Expected $($expectedPackages.Count) .nupkg files, found $($packageFiles.Count): $found"
          }

          foreach ($expectedPackage in $expectedPackages) {
            $packageFileName = "$($expectedPackage.Id).$env:PACKAGE_VERSION.nupkg"
            $packagePath = Join-Path $env:PACKAGE_OUTPUT_DIR $packageFileName
            if (-not (Test-Path -LiteralPath $packagePath -PathType Leaf)) {
              throw "Expected package not found: $packagePath"
            }

            $extractPath = Join-Path ([System.IO.Path]::GetTempPath()) ([System.IO.Path]::GetRandomFileName())
            New-Item -ItemType Directory -Path $extractPath | Out-Null
            $zipPath = Join-Path ([System.IO.Path]::GetTempPath()) "$([System.IO.Path]::GetRandomFileName()).zip"
            Copy-Item -LiteralPath $packagePath -Destination $zipPath
            Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath

            try {
              $nuspecPath = Join-Path $extractPath "$($expectedPackage.Id).nuspec"
              if (-not (Test-Path -LiteralPath $nuspecPath -PathType Leaf)) {
                throw "Nuspec not found in $packageFileName"
              }

              [xml]$nuspec = Get-Content -LiteralPath $nuspecPath -Raw
              $metadata = $nuspec.package.metadata
              $tags = ($metadata.tags -split "\s+") | Where-Object { $_ }
              $dependencyIds = @($metadata.dependencies.group.dependency | ForEach-Object { $_.id })

              if ($metadata.id -ne $expectedPackage.Id) { throw "Invalid PackageId in ${packageFileName}: $($metadata.id)" }
              if ($metadata.version -ne $env:PACKAGE_VERSION) { throw "Invalid version in ${packageFileName}: $($metadata.version)" }
              if ([string]::IsNullOrWhiteSpace($metadata.description)) { throw "Description is missing in $packageFileName" }
              if ($metadata.authors -ne "Rodrigo Oliveira") { throw "Invalid authors in ${packageFileName}: $($metadata.authors)" }
              if ($metadata.projectUrl -ne "https://github.com/rodri-oliveira-dev/poc-arquitetura") { throw "Invalid projectUrl in ${packageFileName}: $($metadata.projectUrl)" }
              if ($metadata.license.type -ne "expression" -or $metadata.license.'#text' -ne "MIT") { throw "Invalid license in $packageFileName" }
              if ($metadata.readme -ne "README.md") { throw "Invalid readme metadata in ${packageFileName}: $($metadata.readme)" }
              if ($metadata.repository.type -ne "git" -or $metadata.repository.url -ne "https://github.com/rodri-oliveira-dev/poc-arquitetura") { throw "Invalid repository metadata in $packageFileName" }

              foreach ($expectedTag in $expectedPackage.Tags) {
                if ($tags -notcontains $expectedTag) {
                  throw "Missing tag '$expectedTag' in $packageFileName"
                }
              }

              foreach ($expectedDependency in $expectedPackage.Dependencies) {
                if ($dependencyIds -notcontains $expectedDependency) {
                  throw "Missing dependency '$expectedDependency' in $packageFileName"
                }
              }

              $readmePath = Join-Path $extractPath "README.md"
              if (-not (Test-Path -LiteralPath $readmePath -PathType Leaf)) {
                throw "README.md not found at package root in $packageFileName"
              }

              $readme = Get-Content -LiteralPath $readmePath -Raw
              if (-not $readme.StartsWith("# $($expectedPackage.Id)")) {
                throw "README.md in $packageFileName does not start with the package name"
              }
              if ($readme -notmatch "dotnet add package $([regex]::Escape($expectedPackage.Id))") {
                throw "README.md in $packageFileName does not include the install command"
              }
              if ($readme -notmatch "POC|poc-arquitetura") {
                throw "README.md in $packageFileName does not mention the architecture POC"
              }
              if ($readme -notmatch "Licenca MIT") {
                throw "README.md in $packageFileName does not mention the MIT license"
              }
            }
            finally {
              Remove-Item -LiteralPath $zipPath -Force
              Remove-Item -LiteralPath $extractPath -Recurse -Force
            }
          }

      - name: Upload Shared NuGet packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: shared-nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: NuGet login
        if: ${{ github.event_name != 'pull_request' }}
        id: nuget_login
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e # v1
        with:
          user: rodri-oliveira-dev

      - name: Publish HttpResilienceDefaults
        if: ${{ github.event_name != 'pull_request' }}
        run: >
          dotnet nuget push
          "$PACKAGE_OUTPUT_DIR/PocArquitetura.HttpResilienceDefaults.$PACKAGE_VERSION.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"

      - name: Publish ApplicationDefaults
        if: ${{ github.event_name != 'pull_request' }}
        run: >
          dotnet nuget push
          "$PACKAGE_OUTPUT_DIR/PocArquitetura.ApplicationDefaults.$PACKAGE_VERSION.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"

      - name: Publish ApiDefaults
        if: ${{ github.event_name != 'pull_request' }}
        run: >
          dotnet nuget push
          "$PACKAGE_OUTPUT_DIR/PocArquitetura.ApiDefaults.$PACKAGE_VERSION.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"

      - name: Write summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Shared NuGet packages"
            echo "- Package version: \`${PACKAGE_VERSION:-not calculated}\`"
            echo "- Output directory: \`$PACKAGE_OUTPUT_DIR\`"
            echo "- Artifact: \`shared-nuget-packages\`"
            echo "- NuGet.org publish: Trusted Publishing via \`NuGet/login\` v1 pinned to SHA"
          } >> "$GITHUB_STEP_SUMMARY"
