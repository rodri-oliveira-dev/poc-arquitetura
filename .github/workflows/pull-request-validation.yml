name: pr-build-and-test

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  AGGREGATE_SOLUTION_PATH: ./PocArquitetura.slnx
  SHARED_SOLUTION_PATH: ./PocArquitetura.Shared.slnx

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect impactful changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            python scripts/ci/detect-dotnet-impact.py \
              --fallback-reason "Event $EVENT_NAME does not provide pull request files. Running both validations." \
              --format github-output >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" > changed-files.json; then
            python scripts/ci/detect-dotnet-impact.py \
              --fallback-reason "Could not detect pull request files. Running both validations." \
              --format github-output >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python scripts/ci/detect-dotnet-impact.py \
            --files-from changed-files.json \
            --input-format json \
            --format github-output >> "$GITHUB_OUTPUT"

      - name: Summarize impact detection
        shell: bash
        env:
          SUMMARY_JSON: ${{ steps.changes.outputs.summary_json }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(os.environ["SUMMARY_JSON"])
          rows = [
              ("Aggregate solution", result["run_aggregate"]),
              ("Shared solution", result["run_shared"]),
              ("Documentation only", result["docs_only"]),
              ("Detection fallback", result["detection_failed"]),
          ]

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("### .NET impact detection\n\n")
              summary.write("| Output | Value |\n")
              summary.write("| --- | --- |\n")
              for name, value in rows:
                  summary.write(f"| {name} | `{str(value).lower()}` |\n")
              summary.write(f"| Changed C# files | `{result['changed_csharp_count']}` |\n")
          PY

      - name: Skip build and tests for documentation-only PR
        if: ${{ steps.changes.outputs.run_aggregate != 'true' && steps.changes.outputs.run_shared != 'true' }}
        run: |
          echo "Apenas arquivos de documentacao ou imagens de documentacao foram alterados. Restore, build e testes foram ignorados." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup .NET
        if: ${{ steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true' }}
        uses: ./.github/actions/setup-dotnet

      - name: Restore aggregate dependencies
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet restore $AGGREGATE_SOLUTION_PATH

      - name: Restore Shared dependencies
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet restore $SHARED_SOLUTION_PATH

      - name: Build aggregate solution
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet build $AGGREGATE_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test aggregate solution
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet test $AGGREGATE_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --no-restore

      - name: Build Shared
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet build $SHARED_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test Shared
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet test $SHARED_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --no-restore
