name: pr-build-and-test

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ./LedgerService.slnx
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect impactful changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! files="$(gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[] | .filename, (.previous_filename // empty)')"; then
            echo "Could not detect pull request files. Running full validation."
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docs_only=true

          if [ -z "$files" ]; then
            docs_only=false
          fi

          while IFS= read -r file; do
            normalized="${file,,}"

            case "$normalized" in
              docs/*|*.md|*.png|*.jpg|*.jpeg|*.gif|*.svg|*.webp)
                ;;
              *)
                docs_only=false
                echo "Impactful file detected: $file"
                ;;
            esac
          done <<< "$files"

          if [ "$docs_only" = true ]; then
            echo "run_validation=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip build and tests for documentation-only PR
        if: ${{ steps.changes.outputs.run_validation == 'false' }}
        run: |
          echo "Apenas arquivos de documentacao ou imagens de documentacao foram alterados. Restore, build e testes foram ignorados." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup .NET
        if: ${{ steps.changes.outputs.run_validation == 'true' }}
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        if: ${{ steps.changes.outputs.run_validation == 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json', 'dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        if: ${{ steps.changes.outputs.run_validation == 'true' }}
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        if: ${{ steps.changes.outputs.run_validation == 'true' }}
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test
        if: ${{ steps.changes.outputs.run_validation == 'true' }}
        run: dotnet test $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --no-restore
