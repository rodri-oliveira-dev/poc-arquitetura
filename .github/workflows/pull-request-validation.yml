name: pr-build-and-test

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: Release
  AGGREGATE_SOLUTION_PATH: ./PocArquitetura.slnx
  SHARED_SOLUTION_PATH: ./PocArquitetura.Shared.slnx

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect impactful changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_aggregate=true" >> "$GITHUB_OUTPUT"
            echo "run_shared=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! files="$(gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[] | .filename, (.previous_filename // empty)')"; then
            echo "Could not detect pull request files. Running both validations."
            echo "run_aggregate=true" >> "$GITHUB_OUTPUT"
            echo "run_shared=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          run_aggregate=false
          run_shared=false

          if [ -z "$files" ]; then
            docs_only=false
            run_aggregate=true
            run_shared=true
          fi

          while IFS= read -r file; do
            normalized="${file,,}"

            case "$normalized" in
              docs/*|*.md|*.png|*.jpg|*.jpeg|*.gif|*.svg|*.webp)
                ;;
              global.json|nuget.config|directory.build.props|directory.packages.props|test.sh|test.ps1|.github/actions/setup-dotnet/*|.github/workflows/*)
                docs_only=false
                run_aggregate=true
                run_shared=true
                echo "Global file detected: $file"
                ;;
              pocarquitetura.shared.slnx|src/shared/*|tests/shared/*)
                docs_only=false
                run_shared=true
                echo "Shared file detected: $file"
                ;;
              pocarquitetura.slnx|auditservice.slnx|balanceservice.slnx|identityservice.slnx|ledgerservice.slnx|transferservice.slnx|src/audit/*|src/identity/*|src/balance/*|src/transfer/*|src/ledger/*|tests/audit/*|tests/identity/*|tests/balance/*|tests/transfer/*|tests/ledger/*|tests/architecture.tests/*)
                docs_only=false
                run_aggregate=true
                echo "Service file detected: $file"
                ;;
              *)
                docs_only=false
                run_aggregate=true
                run_shared=true
                echo "Unclassified impactful file detected: $file. Running both validations."
                ;;
            esac
          done <<< "$files"

          if [ "$docs_only" = true ]; then
            run_aggregate=false
            run_shared=false
          fi

          echo "run_aggregate=$run_aggregate" >> "$GITHUB_OUTPUT"
          echo "run_shared=$run_shared" >> "$GITHUB_OUTPUT"

      - name: Skip build and tests for documentation-only PR
        if: ${{ steps.changes.outputs.run_aggregate != 'true' && steps.changes.outputs.run_shared != 'true' }}
        run: |
          echo "Apenas arquivos de documentacao ou imagens de documentacao foram alterados. Restore, build e testes foram ignorados." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup .NET
        if: ${{ steps.changes.outputs.run_aggregate == 'true' || steps.changes.outputs.run_shared == 'true' }}
        uses: ./.github/actions/setup-dotnet

      - name: Restore aggregate dependencies
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet restore $AGGREGATE_SOLUTION_PATH

      - name: Restore Shared dependencies
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet restore $SHARED_SOLUTION_PATH

      - name: Build aggregate solution
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet build $AGGREGATE_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test aggregate solution
        if: ${{ steps.changes.outputs.run_aggregate == 'true' }}
        run: dotnet test $AGGREGATE_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --no-restore

      - name: Build Shared
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet build $SHARED_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test Shared
        if: ${{ steps.changes.outputs.run_shared == 'true' }}
        run: dotnet test $SHARED_SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --no-restore
