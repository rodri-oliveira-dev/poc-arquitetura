name: release

on:
  pull_request:
    types: [closed]
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  create-release:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Resolve release tag
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin
          git checkout -B main "$MERGE_SHA"

          version="$(dotnet tool run dotnet-gitversion /showvariable MajorMinorPatch)"
          full_semver="$(dotnet tool run dotnet-gitversion /showvariable FullSemVer)"
          tag_name="v$version"

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "full_semver=$full_semver" >> "$GITHUB_OUTPUT"

          if git rev-parse --quiet --verify "refs/tags/$tag_name" >/dev/null; then
            tagged_sha="$(git rev-list -n 1 "$tag_name")"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"

            if [ "$tagged_sha" != "$MERGE_SHA" ]; then
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "release_reason=Tag $tag_name already points to $tagged_sha; no SemVer increment was produced for $MERGE_SHA." >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if gh release view "$tag_name" >/dev/null 2>&1; then
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "release_reason=Release $tag_name already exists for $MERGE_SHA." >> "$GITHUB_OUTPUT"
            else
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "release_reason=Tag $tag_name already exists for $MERGE_SHA; release will be created." >> "$GITHUB_OUTPUT"
            fi

            exit 0
          fi

          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "create_release=true" >> "$GITHUB_OUTPUT"
          echo "release_reason=GitVersion calculated $full_semver; tag $tag_name will be created for $MERGE_SHA." >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: ${{ steps.version.outputs.create_tag == 'true' }}
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" "$MERGE_SHA" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"

      - name: Build release notes
        if: ${{ steps.version.outputs.create_release == 'true' }}
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          commits="$(git log --format="- %h %s (%an)" "$BASE_SHA..$MERGE_SHA" | head -n 50 || true)"
          if [ -z "$commits" ]; then
            commits="$(git log --format="- %h %s (%an)" -n 1 "$MERGE_SHA")"
          fi

          {
            echo "## Pull Request"
            echo "- PR: #$PR_NUMBER - $PR_TITLE"
            echo "- Author: @$PR_AUTHOR"
            echo "- Source branch: \`$PR_BRANCH\`"
            echo "- Merge commit: \`$MERGE_SHA\`"
            echo "- Version: \`$TAG_NAME\`"
            echo "- Link: $PR_URL"
            echo
            echo "## Changelog"
            if [ -n "$PR_BODY" ]; then
              printf "%s\n" "$PR_BODY"
            else
              echo "No pull request description was provided."
            fi
            echo
            echo "## Commits"
            printf "%s\n" "$commits"
          } > release-notes.md

      - name: Create GitHub Release
        if: ${{ steps.version.outputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md \
            --target "$MERGE_SHA"

      - name: Write release summary
        if: ${{ always() }}
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          FULL_SEMVER: ${{ steps.version.outputs.full_semver }}
          RELEASE_REASON: ${{ steps.version.outputs.release_reason }}
        run: |
          {
            echo "## Release"
            echo "- Tag: \`${TAG_NAME:-not calculated}\`"
            echo "- FullSemVer: \`${FULL_SEMVER:-not calculated}\`"
            echo "- Result: ${RELEASE_REASON:-workflow did not reach version resolution}"
          } >> "$GITHUB_STEP_SUMMARY"
