name: script-quality

on:
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PSSCRIPTANALYZER_VERSION: "1.24.0"
  ACTIONLINT_VERSION: "1.7.12"
  ACTIONLINT_LINUX_AMD64_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"

jobs:
  detect-impact:
    name: Detect script and workflow quality impact
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      run_scripts: ${{ steps.impact.outputs.run_scripts }}
      run_workflows: ${{ steps.impact.outputs.run_workflows }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: impact
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          run_scripts=false
          run_workflows=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run_scripts=true
            run_workflows=true
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if ! gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[].filename' > changed-files.txt; then
              echo "::warning::Could not detect pull request files. Running both script and workflow quality validations."
              run_scripts=true
              run_workflows=true
            fi
          elif [ -n "${BEFORE_SHA:-}" ] && ! [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" > changed-files.txt
          else
            echo "::warning::Could not determine pushed file range. Running both script and workflow quality validations."
            run_scripts=true
            run_workflows=true
          fi

          if [ -f changed-files.txt ]; then
            while IFS= read -r file; do
              case "$file" in
                scripts/*|package.json|package-lock.json)
                  run_scripts=true
                  ;;
              esac

              case "$file" in
                .github/workflows/*|.github/actions/*)
                  run_workflows=true
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "run_scripts=$run_scripts" >> "$GITHUB_OUTPUT"
          echo "run_workflows=$run_workflows" >> "$GITHUB_OUTPUT"

          {
            echo "## Script/workflow quality impact"
            echo "- Scripts validation: \`$run_scripts\`"
            echo "- Workflow/actionlint validation: \`$run_workflows\`"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-scripts:
    name: Validate scripts
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.run_scripts == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Install ShellCheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck
          shellcheck --version

      - name: Validate Bash scripts
        shell: bash
        run: |
          mapfile -d '' bash_files < <(find scripts -type f -name '*.sh' -print0 | sort -z)

          if [ "${#bash_files[@]}" -eq 0 ]; then
            echo "::notice::No Bash scripts found under scripts/."
            exit 0
          fi

          printf 'Bash scripts found:\n'
          printf ' - %s\n' "${bash_files[@]}"

          shellcheck -x -P SCRIPTDIR --format=gcc "${bash_files[@]}"

          for file in "${bash_files[@]}"; do
            echo "Checking Bash syntax: ${file}"
            bash -n "${file}"
          done

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Repository PSGallery -Scope CurrentUser -Force
          Import-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION
          Get-Module PSScriptAnalyzer | Format-Table Name, Version, Path

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $psFiles = Get-ChildItem -Path scripts -Recurse -File -Filter '*.ps1' | Sort-Object FullName

          if (-not $psFiles) {
            Write-Host 'No PowerShell scripts found under scripts/.'
            exit 0
          }

          Write-Host 'PowerShell scripts found:'
          foreach ($file in $psFiles) {
            Write-Host " - $($file.FullName)"
          }

          $parseErrors = @()
          foreach ($file in $psFiles) {
            Write-Host "Checking PowerShell syntax: $($file.FullName)"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref] $tokens, [ref] $errors) | Out-Null

            foreach ($errorRecord in $errors) {
              $parseErrors += [pscustomobject]@{
                Path = $file.FullName
                Line = $errorRecord.Extent.StartLineNumber
                Column = $errorRecord.Extent.StartColumnNumber
                Message = $errorRecord.Message
              }
            }
          }

          if ($parseErrors.Count -gt 0) {
            foreach ($errorRecord in $parseErrors) {
              Write-Host "::error file=$($errorRecord.Path),line=$($errorRecord.Line),col=$($errorRecord.Column)::$($errorRecord.Message)"
            }

            throw "PowerShell syntax validation failed for $($parseErrors.Count) issue(s)."
          }

          Import-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION
          $errorResults = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error)
          if ($errorResults.Count -gt 0) {
            foreach ($result in $errorResults) {
              Write-Host "::error file=$($result.ScriptPath),line=$($result.Line),col=$($result.Column)::$($result.RuleName): $($result.Message)"
            }

            throw "PSScriptAnalyzer found $($errorResults.Count) critical issue(s)."
          }

          Write-Host 'No critical PowerShell issues found.'

      - name: Validate Node scripts
        shell: bash
        run: |
          mapfile -d '' node_files < <(find scripts -type f -name '*.mjs' -print0 | sort -z)

          if [ "${#node_files[@]}" -eq 0 ]; then
            echo "::notice::No Node .mjs scripts found under scripts/."
            exit 0
          fi

          printf 'Node scripts found:\n'
          printf ' - %s\n' "${node_files[@]}"

          for file in "${node_files[@]}"; do
            echo "Checking Node syntax: ${file}"
            node --check "${file}"
          done

      - name: Validate Python scripts
        shell: bash
        run: |
          python -m compileall scripts/quality
          python -m unittest discover \
            -s scripts/quality/tests \
            -p "test_*.py" \
            -v

  validate-workflows:
    name: Validate workflows and composite actions
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.run_workflows == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck
          shellcheck --version

      - name: Install actionlint
        shell: bash
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl \
            --proto '=https' \
            --proto-redir '=https' \
            -fsSLO \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          echo "${ACTIONLINT_LINUX_AMD64_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "$archive" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Validate GitHub workflows
        shell: bash
        run: |
          mapfile -d '' workflow_files < <(find .github/workflows -maxdepth 1 -type f -name '*.yml' -print0 | sort -z)

          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "::error::No workflow files found under .github/workflows."
            exit 1
          fi

          actionlint -color=false "${workflow_files[@]}"

      - name: Validate composite actions through actionlint
        shell: bash
        run: |
          mapfile -d '' action_files < <(find .github/actions -mindepth 2 -maxdepth 2 -type f -name action.yml -print0 | sort -z)

          if [ "${#action_files[@]}" -eq 0 ]; then
            echo "::error::No composite action files found under .github/actions."
            exit 1
          fi

          mkdir -p .actionlint-generated
          {
            echo "name: validate-local-composite-actions"
            echo "on: workflow_dispatch"
            echo "permissions:"
            echo "  contents: read"
            echo "jobs:"
            echo "  validate:"
            echo "    runs-on: ubuntu-latest"
            echo "    steps:"
            for action_file in "${action_files[@]}"; do
              action_dir="$(dirname "$action_file")"
              action_name="$(basename "$action_dir")"
              echo "      - name: Validate ${action_name}"
              echo "        uses: ./${action_dir}"
            done
          } > .actionlint-generated/local-composite-actions.yml

          actionlint -color=false .actionlint-generated/local-composite-actions.yml
