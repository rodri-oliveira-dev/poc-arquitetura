name: terraform-validation

on:
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - "**/Dockerfile"
      - "Dockerfile"
      - "compose*.yaml"
      - ".github/workflows/terraform-validation.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - "**/Dockerfile"
      - "Dockerfile"
      - "compose*.yaml"
      - ".github/workflows/terraform-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.15.5"
  TFLINT_VERSION: "v0.62.1"

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Blocking gate: these scans are local to the checked-out repository,
      # require no cloud credentials and never build images or run Terraform plans.
      # Terraform init runs with backend disabled only for syntax validation;
      # this workflow does not bypass remote backend locking because it never plans or applies.
      - name: Scan Dockerfile and Terraform misconfigurations with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          tf-vars: infra/terraform/environments/dev/validation.tfvars
          hide-progress: true

      - name: Scan repository filesystem with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          tf-vars: infra/terraform/environments/dev/validation.tfvars
          hide-progress: true
          skip-dirs: .git,.terraform,**/bin,**/obj,.vs,.idea,TestResults,**/TestResults,coverage,CodeCoverage,StrykerOutput,.dotnet,.dotnet-home,.nuget,artifacts,infra/nginx/certs

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Validate Terraform and run TFLint
        run: ./scripts/validate-terraform.sh
