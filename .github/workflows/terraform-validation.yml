name: terraform-validation

on:
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - "**/Dockerfile"
      - "Dockerfile"
      - "compose*.yaml"
      - ".github/workflows/terraform-validation.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - "**/Dockerfile"
      - "Dockerfile"
      - "compose*.yaml"
      - ".github/workflows/terraform-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.15.5"
  TERRAFORM_DEV_ROOT: ./infra/terraform/environments/dev

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan Dockerfile and Terraform misconfigurations with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true

      - name: Scan repository filesystem with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true
          skip-dirs: .git,.terraform,TestResults,artifacts

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive ./infra/terraform

      - name: Initialize Terraform without backend
        run: terraform -chdir="$TERRAFORM_DEV_ROOT" init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir="$TERRAFORM_DEV_ROOT" validate

  plan:
    name: Plan Terraform Dev
    needs: validate
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.GCP_PROJECT_ID != '' &&
      vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
      vars.GCP_TERRAFORM_SERVICE_ACCOUNT != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Initialize Terraform without backend
        run: terraform -chdir="$TERRAFORM_DEV_ROOT" init -backend=false -input=false

      - name: Plan Terraform dev environment
        run: >-
          terraform -chdir="$TERRAFORM_DEV_ROOT" plan
          -input=false
          -lock=false
          -no-color
          -var="project_id=${{ vars.GCP_PROJECT_ID }}"
          -var="region=${{ vars.GCP_REGION || 'us-central1' }}"
