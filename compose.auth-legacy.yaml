x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

volumes:
  auth-api-data:

services:
  auth-api:
    build:
      context: .
      dockerfile: src/Auth.Api/Dockerfile
    container_name: poc-auth-api
    logging: *default-logging
    profiles:
      - legacy-auth
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      # Persistencia da chave dentro do volume.
      Auth__KeyPath: "/data/keys/auth-rsa-key.json"
      # Credenciais locais de POC. Nao ha fallback em appsettings.json/producao.
      Auth__DevelopmentUser__Username: "${AUTH_POC_USERNAME:-local_user}"
      Auth__DevelopmentUser__Password: "${AUTH_POC_PASSWORD:?Defina AUTH_POC_PASSWORD no ambiente ou em .env.local}"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "Auth.Api"
    ports:
      - "5030:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    volumes:
      - auth-api-data:/data
    networks:
      - poc-net
