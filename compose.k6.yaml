x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  ledger-service:
    environment:
      ApiLimits__RateLimitPermitLimit: "10000"
      ApiLimits__RateLimitWindowSeconds: "60"
      ApiLimits__RateLimitQueueLimit: "1000"

  balance-service:
    environment:
      ApiLimits__RateLimitPermitLimit: "10000"
      ApiLimits__RateLimitWindowSeconds: "60"
      ApiLimits__RateLimitQueueLimit: "1000"

  transfer-service:
    environment:
      ApiLimits__RateLimitPermitLimit: "10000"
      ApiLimits__RateLimitWindowSeconds: "60"
      ApiLimits__RateLimitQueueLimit: "1000"

  transfer-worker:
    environment:
      TransferService__Worker__PollingInterval: "${K6_TRANSFER_WORKER_POLLING_INTERVAL:-00:00:01}"
      TransferService__Worker__RetryBackoff: "${K6_TRANSFER_WORKER_RETRY_BACKOFF:-00:00:02}"
      TransferService__Worker__BatchSize: "${K6_TRANSFER_WORKER_BATCH_SIZE:-20}"
      TransferService__Worker__MaxRetryCount: "${K6_TRANSFER_WORKER_MAX_RETRY_COUNT:-10}"
      HttpResilience__Clients__Ledger__TotalTimeout: "${K6_LEDGER_RESILIENCE_TOTAL_TIMEOUT:-00:00:01}"
      HttpResilience__Clients__Ledger__AttemptTimeout: "${K6_LEDGER_RESILIENCE_ATTEMPT_TIMEOUT:-00:00:00.300}"
      HttpResilience__Clients__Ledger__RetryCount: "${K6_LEDGER_RESILIENCE_RETRY_COUNT:-1}"
      HttpResilience__Clients__Ledger__RetryDelay: "${K6_LEDGER_RESILIENCE_RETRY_DELAY:-00:00:00.100}"
      HttpResilience__Clients__Ledger__CircuitBreakerFailureRatio: "${K6_LEDGER_CIRCUIT_BREAKER_FAILURE_RATIO:-0.5}"
      HttpResilience__Clients__Ledger__CircuitBreakerMinimumThroughput: "${K6_LEDGER_CIRCUIT_BREAKER_MINIMUM_THROUGHPUT:-2}"
      HttpResilience__Clients__Ledger__CircuitBreakerSamplingDuration: "${K6_LEDGER_CIRCUIT_BREAKER_SAMPLING_DURATION:-00:00:10}"
      HttpResilience__Clients__Ledger__CircuitBreakerBreakDuration: "${K6_LEDGER_CIRCUIT_BREAKER_BREAK_DURATION:-00:00:05}"

  k6:
    image: docker.io/grafana/k6:1.7.1
    container_name: poc-k6
    logging: *default-logging
    profiles:
      - k6
    working_dir: /scripts
    entrypoint: [ "k6" ]
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512m
          pids: 256
    volumes:
      - ./loadtests/k6:/scripts:ro
      - ./artifacts/k6:/artifacts
      - ./.env.k6.auto:/.env.k6.auto:ro
    env_file:
      - ./.env.k6.auto
    networks:
      - poc-net
