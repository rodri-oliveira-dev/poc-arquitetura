x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  ledger-service:
    profiles:
      - direct-ledger

  ledger-service-1:
    image: poc-arquitetura-ledger-service:local
    build:
      context: .
      dockerfile: src/LedgerService.Api/Dockerfile
    container_name: poc-ledger-service-1
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=ledger_app_user;Password=${LEDGER_DB_PASSWORD:?Defina LEDGER_DB_PASSWORD no ambiente ou em .env.local}"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "LedgerService.Api"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  ledger-service-2:
    image: poc-arquitetura-ledger-service:local
    container_name: poc-ledger-service-2
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=ledger_app_user;Password=${LEDGER_DB_PASSWORD:?Defina LEDGER_DB_PASSWORD no ambiente ou em .env.local}"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "LedgerService.Api"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  transfer-worker:
    depends_on: !reset
      postgres-db:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      ledger-service-1:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      TransferService__Worker__Ledger__BaseAddress: "http://ledger-service-1:8080"

  nginx-certs-init:
    image: alpine:3.22
    container_name: poc-nginx-certs-init
    logging: *default-logging
    network_mode: none
    command:
      - sh
      - -ec
      - |
        cp /source/localhost.crt /target/localhost.crt
        cp /source/localhost.key /target/localhost.key
        chmod 0444 /target/localhost.crt /target/localhost.key
    volumes:
      - ./infra/nginx/certs:/source:ro
      - nginx-certs:/target
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32m
          pids: 32

  nginx-edge:
    image: poc-arquitetura-nginx-edge:local
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: poc-nginx-edge
    logging: *default-logging
    depends_on:
      nginx-certs-init:
        condition: service_completed_successfully
      ledger-service-1:
        condition: service_started
      ledger-service-2:
        condition: service_started
      balance-service:
        condition: service_started
    ports:
      - "7443:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./infra/nginx/html:/usr/share/nginx/html:ro
      - nginx-certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
          pids: 128
    networks:
      - poc-net

volumes:
  nginx-certs:
    labels:
      auto-prune: "true"
      retention: "7d"
      environment: "local"
      owner: "docker-compose"
      description: "Recreated local Nginx certificate cache copied from infra/nginx/certs"
