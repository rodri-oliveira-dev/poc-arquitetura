name: poc-arquitetura

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

networks:
  poc-net:
    driver: bridge

volumes:
  sonar-postgres-data:
  sonarqube-data:
  sonarqube-extensions:

services:
  sonar-db:
    image: docker.io/postgres:16
    container_name: poc-sonar-db
    logging: *default-logging
    profiles:
      - quality
    environment:
      POSTGRES_DB: "${SONAR_DB_NAME:-sonarqube}"
      POSTGRES_USER: "${SONAR_DB_USER:-sonar}"
      POSTGRES_PASSWORD: "${SONAR_DB_PASSWORD:?Defina SONAR_DB_PASSWORD no ambiente ou em .env.local}"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    volumes:
      - sonar-postgres-data:/var/lib/postgresql/data
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 5s
      timeout: 3s
      retries: 20

  sonarqube:
    image: docker.io/sonarqube:community
    container_name: poc-sonarqube
    logging: *default-logging
    profiles:
      - quality
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:-sonarqube}"
      SONAR_JDBC_USERNAME: "${SONAR_DB_USER:-sonar}"
      SONAR_JDBC_PASSWORD: "${SONAR_DB_PASSWORD:?Defina SONAR_DB_PASSWORD no ambiente ou em .env.local}"
    ports:
      - "${SONAR_HOST_PORT:-9000}:9000"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2g
          pids: 512
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    tmpfs:
      - /opt/sonarqube/logs:size=${SONAR_LOGS_TMPFS_SIZE:-256m}
    networks:
      - poc-net
