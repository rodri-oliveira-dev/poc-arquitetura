name: poc-arquitetura

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

networks:
  poc-net:
    driver: bridge

volumes:
  postgres-data:


services:
  # --- Databases ---
  postgres-db:
    image: docker.io/postgres:16
    container_name: poc-postgres-db
    logging: *default-logging
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no ambiente ou em .env.local}"
      LEDGER_DB_PASSWORD: "${LEDGER_DB_PASSWORD:?Defina LEDGER_DB_PASSWORD no ambiente ou em .env.local}"
      LEDGER_DB_MIGRATOR_PASSWORD: "${LEDGER_DB_MIGRATOR_PASSWORD:?Defina LEDGER_DB_MIGRATOR_PASSWORD no ambiente ou em .env.local}"
      BALANCE_DB_READ_PASSWORD: "${BALANCE_DB_READ_PASSWORD:?Defina BALANCE_DB_READ_PASSWORD no ambiente ou em .env.local}"
      BALANCE_DB_WRITE_PASSWORD: "${BALANCE_DB_WRITE_PASSWORD:?Defina BALANCE_DB_WRITE_PASSWORD no ambiente ou em .env.local}"
      BALANCE_DB_MIGRATOR_PASSWORD: "${BALANCE_DB_MIGRATOR_PASSWORD:?Defina BALANCE_DB_MIGRATOR_PASSWORD no ambiente ou em .env.local}"
      TRANSFER_DB_PASSWORD: "${TRANSFER_DB_PASSWORD:?Defina TRANSFER_DB_PASSWORD no ambiente ou em .env.local}"
      TRANSFER_DB_MIGRATOR_PASSWORD: "${TRANSFER_DB_MIGRATOR_PASSWORD:?Defina TRANSFER_DB_MIGRATOR_PASSWORD no ambiente ou em .env.local}"
      IDENTITY_DB_PASSWORD: "${IDENTITY_DB_PASSWORD:?Defina IDENTITY_DB_PASSWORD no ambiente ou em .env.local}"
      IDENTITY_DB_MIGRATOR_PASSWORD: "${IDENTITY_DB_MIGRATOR_PASSWORD:?Defina IDENTITY_DB_MIGRATOR_PASSWORD no ambiente ou em .env.local}"
    ports:
      # Porta exposta para uso local (psql, migrations, etc.)
      # Obs: pode conflitar com um Postgres já rodando no host.
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres_admin -d appdb" ]
      interval: 5s
      timeout: 3s
      retries: 20

  # --- Pub/Sub emulator (provider explicito/legado) ---
  pubsub-emulator:
    profiles:
      - legacy-pubsub
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:548.0.0-emulators
    container_name: poc-pubsub-emulator
    logging: *default-logging
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - "--host-port=0.0.0.0:8085"
      - "--project=${PUBSUB_PROJECT_ID:-poc-local}"
    ports:
      - "${PUBSUB_EMULATOR_HOST_PORT:-8085}:8085"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8085'" ]
      interval: 5s
      timeout: 3s
      retries: 30

  pubsub-init:
    profiles:
      - legacy-pubsub
    image: docker.io/curlimages/curl:8.16.0
    container_name: poc-pubsub-init
    logging: *default-logging
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_PROJECT_ID: "${PUBSUB_PROJECT_ID:-poc-local}"
      PUBSUB_LEDGER_EVENTS_TOPIC_ID: "${PUBSUB_LEDGER_EVENTS_TOPIC_ID:-ledger.ledgerentry.created.local}"
      PUBSUB_LEDGER_EVENTS_DLQ_TOPIC_ID: "${PUBSUB_LEDGER_EVENTS_DLQ_TOPIC_ID:-ledger.ledgerentry.created.dlq.local}"
      PUBSUB_BALANCE_SUBSCRIPTION_ID: "${PUBSUB_BALANCE_SUBSCRIPTION_ID:-balance-service-ledger-events-local}"
      PUBSUB_LEDGER_EVENTS_DLQ_INSPECTION_SUBSCRIPTION_ID: "${PUBSUB_LEDGER_EVENTS_DLQ_INSPECTION_SUBSCRIPTION_ID:-ledger-events-application-dlq-inspection-local}"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        emulator_url="http://pubsub-emulator:8085";
        create_resource() {
          resource_path="$$1";
          body="$$2";
          status="$$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request PUT \
            --header 'Content-Type: application/json' \
            --data "$$body" \
            "$$emulator_url/v1/$$resource_path")";
          case "$$status" in
            200|409) ;;
            *) echo "[pubsub-init] Falha ao criar $$resource_path: HTTP $$status" >&2; exit 1 ;;
          esac;
        };
        echo "[pubsub-init] Criando recursos Pub/Sub locais (idempotente)...";
        create_resource "projects/$$PUBSUB_PROJECT_ID/topics/$$PUBSUB_LEDGER_EVENTS_TOPIC_ID" '{}';
        create_resource "projects/$$PUBSUB_PROJECT_ID/topics/$$PUBSUB_LEDGER_EVENTS_DLQ_TOPIC_ID" '{}';
        create_resource \
          "projects/$$PUBSUB_PROJECT_ID/subscriptions/$$PUBSUB_BALANCE_SUBSCRIPTION_ID" \
          "{\"topic\":\"projects/$$PUBSUB_PROJECT_ID/topics/$$PUBSUB_LEDGER_EVENTS_TOPIC_ID\",\"ackDeadlineSeconds\":60,\"enableMessageOrdering\":false}";
        create_resource \
          "projects/$$PUBSUB_PROJECT_ID/subscriptions/$$PUBSUB_LEDGER_EVENTS_DLQ_INSPECTION_SUBSCRIPTION_ID" \
          "{\"topic\":\"projects/$$PUBSUB_PROJECT_ID/topics/$$PUBSUB_LEDGER_EVENTS_DLQ_TOPIC_ID\",\"ackDeadlineSeconds\":60}";
        echo "[pubsub-init] OK.";
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
          pids: 128
    networks:
      - poc-net

  # --- Kafka (KRaft single node) ---
  kafka:
    # Usamos a imagem oficial do Apache Kafka no Docker Hub.
    image: docker.io/apache/kafka:3.7.0
    container_name: poc-kafka
    logging: *default-logging
    environment:
      # KRaft (sem ZooKeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      # Ajustes básicos
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      # Obs: pode conflitar com um Kafka já rodando no host.
      - "19092:9092"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
          pids: 512
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 1>/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 30

  # Consumer está com AllowAutoCreateTopics=false, então garantimos o tópico via init.
  kafka-init-topics:
    image: docker.io/apache/kafka:3.7.0
    container_name: poc-kafka-init-topics
    logging: *default-logging
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
          pids: 128
    networks:
      - poc-net
    entrypoint:
      - /bin/bash
      - -ec
      - |
        echo "[kafka-init-topics] Aguardando Kafka ficar disponível...";
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list 1>/dev/null 2>&1; do
          sleep 2;
        done;
        echo "[kafka-init-topics] Criando tópicos (idempotente)...";
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.ledgerentry.created --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.lancamento.estorno.solicitado --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.lancamentos.reprocessamento.solicitado --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.ledgerentry.created.dlq --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.solicitada --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.debito-criado --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.credito-criado --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.concluida --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.compensacao-solicitada --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.compensada --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.falhou --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transfer.transferencia.dlq --partitions 1 --replication-factor 1;
        echo "[kafka-init-topics] OK.";

  # --- Local email capture ---
  mailpit:
    image: axllent/mailpit
    container_name: poc-mailpit
    logging: *default-logging
    ports:
      - "1025:1025"
      - "8025:8025"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
          pids: 128
    networks:
      - poc-net

  # --- Microservices ---
  ledger-service:
    build:
      context: .
      dockerfile: src/LedgerService.Api/Dockerfile
    container_name: poc-ledger-service
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Local"

      # Auth (JWT Bearer via JWKS)
      # Por padrao, valida tokens Keycloak com issuer publico do realm e JWKS interno.
      # Para usar o Auth.Api legado, sobrescreva JWT_ISSUER e JWT_JWKS_URL no .env.
      # HTTP/JWKS é aceito somente porque o compose local roda em Local.
      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"

      # Overrides dos appsettings (no container, 127.0.0.1 aponta para ele mesmo)
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=ledger_app_user;Password=${LEDGER_DB_PASSWORD:?Defina LEDGER_DB_PASSWORD no ambiente ou em .env.local}"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "LedgerService.Api"
    ports:
      # Mantém a mesma porta do launchSettings para facilitar uso local
      - "5226:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  ledger-worker:
    build:
      context: .
      dockerfile: src/LedgerService.Worker/Dockerfile
    container_name: poc-ledger-worker
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: "Local"

      # Overrides dos appsettings (no container, 127.0.0.1 aponta para ele mesmo)
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=ledger_app_user;Password=${LEDGER_DB_PASSWORD:?Defina LEDGER_DB_PASSWORD no ambiente ou em .env.local}"
      Messaging__Provider: "Kafka"
      PubSub__Enabled: "false"
      PUBSUB_PROJECT_ID: "${PUBSUB_PROJECT_ID:-poc-local}"
      PubSub__Producer__ProjectId: "${PUBSUB_PROJECT_ID:-poc-local}"
      PubSub__Producer__DefaultTopicId: "${PUBSUB_LEDGER_EVENTS_TOPIC_ID:-ledger.ledgerentry.created.local}"
      PubSub__Producer__EnableMessageOrdering: "false"
      PubSub__Producer__TopicMap__LedgerEntryCreated.v1: "${PUBSUB_LEDGER_EVENTS_TOPIC_ID:-ledger.ledgerentry.created.local}"
      PubSub__Producer__TopicMap__LedgerEntryCreated.v2: "${PUBSUB_LEDGER_EVENTS_TOPIC_ID:-ledger.ledgerentry.created.local}"
      Kafka__Producer__BootstrapServers: "kafka:9092"
      Kafka__Producer__SecurityProtocol: "Plaintext"
      Reprocessamentos__Consumer__BootstrapServers: "kafka:9092"
      Reprocessamentos__Consumer__SecurityProtocol: "Plaintext"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "LedgerService.Worker"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  balance-service:
    build:
      context: .
      dockerfile: src/BalanceService.Api/Dockerfile
    container_name: poc-balance-service
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Local"

      # Auth (JWT Bearer via JWKS)
      # Por padrao, valida tokens Keycloak com issuer publico do realm e JWKS interno.
      # Para usar o Auth.Api legado, sobrescreva JWT_ISSUER e JWT_JWKS_URL no .env.
      # HTTP/JWKS é aceito somente porque o compose local roda em Local.
      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"

      # Overrides dos appsettings
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=balance_read_user;Password=${BALANCE_DB_READ_PASSWORD:?Defina BALANCE_DB_READ_PASSWORD no ambiente ou em .env.local}"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "BalanceService.Api"
    ports:
      - "5228:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  balance-worker:
    build:
      context: .
      dockerfile: src/BalanceService.Worker/Dockerfile
    container_name: poc-balance-worker
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: "Local"

      # Overrides dos appsettings (no container, 127.0.0.1 aponta para ele mesmo)
      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=balance_write_user;Password=${BALANCE_DB_WRITE_PASSWORD:?Defina BALANCE_DB_WRITE_PASSWORD no ambiente ou em .env.local}"
      Messaging__Provider: "Kafka"
      PubSub__Enabled: "false"
      PUBSUB_PROJECT_ID: "${PUBSUB_PROJECT_ID:-poc-local}"
      PubSub__Consumer__ProjectId: "${PUBSUB_PROJECT_ID:-poc-local}"
      PubSub__Consumer__SubscriptionId: "${PUBSUB_BALANCE_SUBSCRIPTION_ID:-balance-service-ledger-events-local}"
      PubSub__Consumer__DeadLetterTopicId: "${PUBSUB_LEDGER_EVENTS_DLQ_TOPIC_ID:-ledger.ledgerentry.created.dlq.local}"
      PubSub__Consumer__EnableExactlyOnceDelivery: "false"
      PubSub__Consumer__AckDeadlineSeconds: "60"
      PubSub__Consumer__ProcessingErrorRetryDelay: "00:00:05"
      Kafka__Consumer__BootstrapServers: "kafka:9092"
      Kafka__Consumer__SecurityProtocol: "Plaintext"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "BalanceService.Worker"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  transfer-service:
    build:
      context: .
      dockerfile: src/TransferService.Api/Dockerfile
    container_name: poc-transfer-service
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Local"

      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__Audience: "transfer-api"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"

      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=transfer_app_user;Password=${TRANSFER_DB_PASSWORD:?Defina TRANSFER_DB_PASSWORD no ambiente ou em .env.local}"
      Messaging__Provider: "Kafka"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "TransferService.Api"
    ports:
      - "${TRANSFER_SERVICE_HOST_PORT:-5230}:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  transfer-worker:
    build:
      context: .
      dockerfile: src/TransferService.Worker/Dockerfile
    container_name: poc-transfer-worker
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      ledger-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: "Local"

      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=transfer_app_user;Password=${TRANSFER_DB_PASSWORD:?Defina TRANSFER_DB_PASSWORD no ambiente ou em .env.local}"
      Messaging__Provider: "Kafka"
      TransferService__Worker__Enabled: "true"
      TransferService__Worker__PollingInterval: "00:00:05"
      TransferService__Worker__BatchSize: "20"
      TransferService__Worker__MaxRetryCount: "5"
      TransferService__Worker__LockDuration: "00:02:00"
      TransferService__Worker__RetryBackoff: "00:00:30"
      TransferService__Worker__DlqTopic: "transfer.transferencia.dlq"
      TransferService__Worker__Kafka__BootstrapServers: "kafka:9092"
      TransferService__Worker__Kafka__ClientId: "transfer-service-worker-local"
      TransferService__Worker__Kafka__SecurityProtocol: "Plaintext"
      TransferService__Worker__Kafka__Acks: "all"
      TransferService__Worker__Kafka__EnableIdempotence: "true"
      TransferService__Worker__Topics__Solicitada: "transfer.transferencia.solicitada"
      TransferService__Worker__Topics__DebitoCriado: "transfer.transferencia.debito-criado"
      TransferService__Worker__Topics__CreditoCriado: "transfer.transferencia.credito-criado"
      TransferService__Worker__Topics__Concluida: "transfer.transferencia.concluida"
      TransferService__Worker__Topics__CompensacaoSolicitada: "transfer.transferencia.compensacao-solicitada"
      TransferService__Worker__Topics__Compensada: "transfer.transferencia.compensada"
      TransferService__Worker__Topics__Falhou: "transfer.transferencia.falhou"
      TransferService__Worker__Ledger__BaseAddress: "http://ledger-service:8080"
      TransferService__Worker__Ledger__Timeout: "00:00:10"
      TransferService__Worker__Ledger__Auth__TokenEndpoint: "http://keycloak:8080/realms/poc/protocol/openid-connect/token"
      TransferService__Worker__Ledger__Auth__ClientId: "${KEYCLOAK_CLIENT_ID:-poc-automation}"
      TransferService__Worker__Ledger__Auth__ClientSecret: "${KEYCLOAK_CLIENT_SECRET:?Defina KEYCLOAK_CLIENT_SECRET no ambiente ou em .env.local}"
      TransferService__Worker__Ledger__Auth__Scope: "${TRANSFER_WORKER_LEDGER_AUTH_SCOPE:-ledger.write}"
      TransferService__Worker__Ledger__Auth__RefreshSkew: "00:01:00"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "TransferService.Worker"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  keycloak-identity-admin-init:
    image: quay.io/keycloak/keycloak:26.6.2
    container_name: poc-keycloak-identity-admin-init
    logging: *default-logging
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-local_admin}"
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?Defina KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD no ambiente ou em .env.local}"
      KEYCLOAK_IDENTITY_ADMIN_CLIENT_ID: "${KEYCLOAK_IDENTITY_ADMIN_CLIENT_ID:-identity-service-admin}"
    entrypoint:
      - /bin/bash
      - -ec
      - |
        echo "[keycloak-identity-admin-init] Configurando roles administrativas do IdentityService...";
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080 \
          --realm master \
          --user "$$KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME" \
          --password "$$KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD" \
          1>/dev/null;
        /opt/keycloak/bin/kcadm.sh add-roles \
          -r poc \
          --uusername "service-account-$$KEYCLOAK_IDENTITY_ADMIN_CLIENT_ID" \
          --cclientid realm-management \
          --rolename manage-users \
          --rolename view-users;
        echo "[keycloak-identity-admin-init] OK.";
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
          pids: 128
    networks:
      - poc-net

  identity-service:
    build:
      context: .
      dockerfile: src/identity/IdentityService.Api/Dockerfile
    container_name: poc-identity-service
    logging: *default-logging
    depends_on:
      postgres-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-identity-admin-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Local"

      Jwt__Issuer: "${JWT_ISSUER:-http://localhost:8081/realms/poc}"
      Jwt__Audience: "identity-api"
      Jwt__JwksUrl: "${JWT_JWKS_URL:-http://keycloak:8080/realms/poc/protocol/openid-connect/certs}"
      Jwt__RequireHttpsMetadata: "${JWT_REQUIRE_HTTPS_METADATA:-false}"

      ConnectionStrings__DefaultConnection: "Host=postgres-db;Port=5432;Database=appdb;Username=identity_app_user;Password=${IDENTITY_DB_PASSWORD:?Defina IDENTITY_DB_PASSWORD no ambiente ou em .env.local}"
      IdentityProvider__Keycloak__BaseUrl: "http://keycloak:8080"
      IdentityProvider__Keycloak__Realm: "poc"
      IdentityProvider__Keycloak__TokenEndpoint: "/realms/poc/protocol/openid-connect/token"
      IdentityProvider__Keycloak__ClientId: "${KEYCLOAK_IDENTITY_ADMIN_CLIENT_ID:-identity-service-admin}"
      IdentityProvider__Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET:?Defina KEYCLOAK_CLIENT_SECRET no ambiente ou em .env.local}"
      Email__Provider: "Mailpit"
      Email__AuthenticationUrl: "http://localhost:${KEYCLOAK_HOST_PORT:-8081}/realms/poc/account"
      Mailpit__Host: "mailpit"
      Mailpit__Port: "1025"
      Mailpit__EnableSsl: "false"
      Mailpit__From: "noreply@poc-arquitetura.local"
      Mailpit__FromName: "POC Arquitetura"
      Observability__OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      Observability__OpenTelemetry__UseConsoleExporter: "false"
      Observability__OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Observability__OpenTelemetry__ServiceName: "IdentityService.Api"
    ports:
      - "${IDENTITY_SERVICE_HOST_PORT:-5232}:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
          pids: 256
    networks:
      - poc-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    container_name: poc-keycloak
    logging: *default-logging
    command: [ "start-dev", "--import-realm" ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-local_admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?Defina KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD no ambiente ou em .env.local}"
      KC_HOSTNAME: "http://localhost:${KEYCLOAK_HOST_PORT:-8081}"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:?Defina KEYCLOAK_CLIENT_SECRET no ambiente ou em .env.local}"
      KEYCLOAK_LOCAL_LEDGER_USER_PASSWORD: "${KEYCLOAK_LOCAL_LEDGER_USER_PASSWORD:?Defina KEYCLOAK_LOCAL_LEDGER_USER_PASSWORD no ambiente ou em .env.local}"
      KEYCLOAK_LOCAL_BALANCE_USER_PASSWORD: "${KEYCLOAK_LOCAL_BALANCE_USER_PASSWORD:?Defina KEYCLOAK_LOCAL_BALANCE_USER_PASSWORD no ambiente ou em .env.local}"
      KEYCLOAK_LOCAL_ADMIN_USER_PASSWORD: "${KEYCLOAK_LOCAL_ADMIN_USER_PASSWORD:?Defina KEYCLOAK_LOCAL_ADMIN_USER_PASSWORD no ambiente ou em .env.local}"
    ports:
      - "${KEYCLOAK_HOST_PORT:-8081}:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1g
          pids: 512
    networks:
      - poc-net
    volumes:
      - ./infra/keycloak/realm-poc.json:/opt/keycloak/data/import/realm-poc.json:ro
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec \"exec 3<>/dev/tcp/localhost/9000; printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep 'HTTP/1.0 200' <&3\"" ]
      interval: 10s
      timeout: 5s
      retries: 30
