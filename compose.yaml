name: poc-arquitetura

networks:
  poc-net:
    driver: bridge

volumes:
  ledger-postgres-data:
  balance-postgres-data:


services:
  # --- Databases ---
  ledger-db:
    image: docker.io/postgres:16
    container_name: poc-ledger-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: app123
    ports:
      # Porta exposta para uso local (psql, migrations, etc.)
      # Obs: pode conflitar com um Postgres já rodando no host.
      - "15432:5432"
    volumes:
      - ledger-postgres-data:/var/lib/postgresql/data
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U appuser -d appdb" ]
      interval: 5s
      timeout: 3s
      retries: 20

  balance-db:
    image: docker.io/postgres:16
    container_name: poc-balance-db
    environment:
      POSTGRES_DB: dbBalance
      POSTGRES_USER: userBalance
      POSTGRES_PASSWORD: Balance123
    ports:
      # Mantém a porta 5433 no host, como no appsettings original (apenas para conveniência local)
      # Obs: pode conflitar com um Postgres já rodando no host.
      - "15433:5432"
    volumes:
      - balance-postgres-data:/var/lib/postgresql/data
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U userBalance -d dbBalance" ]
      interval: 5s
      timeout: 3s
      retries: 20

  # --- Kafka (KRaft single node) ---
  kafka:
    # Usamos a imagem oficial do Apache Kafka no Docker Hub.
    image: docker.io/apache/kafka:3.7.0
    container_name: poc-kafka
    environment:
      # KRaft (sem ZooKeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      # Ajustes básicos
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      # Obs: pode conflitar com um Kafka já rodando no host.
      - "19092:9092"
    networks:
      - poc-net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 1>/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 30

  # Consumer está com AllowAutoCreateTopics=false, então garantimos o tópico via init.
  kafka-init-topics:
    image: docker.io/apache/kafka:3.7.0
    container_name: poc-kafka-init-topics
    depends_on:
      - kafka
    networks:
      - poc-net
    entrypoint:
      - /bin/bash
      - -ec
      - |
        echo "[kafka-init-topics] Aguardando Kafka ficar disponível...";
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list 1>/dev/null 2>&1; do
          sleep 2;
        done;
        echo "[kafka-init-topics] Criando tópicos (idempotente)...";
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.ledgerentry.created --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic ledger.ledgerentry.created.dlq --partitions 1 --replication-factor 1;
        echo "[kafka-init-topics] OK.";

  # --- Microservices ---
  ledger-service:
    build:
      context: .
      dockerfile: src/LedgerService.Api/Dockerfile
    container_name: poc-ledger-service
    depends_on:
      - ledger-db
      - kafka
      - kafka-init-topics
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"

      # Auth (JWT Bearer via JWKS)
      # Dentro do compose, localhost aponta para o próprio container, então usamos o nome do service.
      Jwt__JwksUrl: "http://auth-api:8080/.well-known/jwks.json"

      # Overrides dos appsettings (no container, 127.0.0.1 aponta para ele mesmo)
      ConnectionStrings__DefaultConnection: "Host=ledger-db;Port=5432;Database=appdb;Username=appuser;Password=app123"
      Kafka__Producer__BootstrapServers: "kafka:9092"
    ports:
      # Mantém a mesma porta do launchSettings para facilitar uso local
      - "5226:8080"
    networks:
      - poc-net

  balance-service:
    build:
      context: .
      dockerfile: src/BalanceService.Api/Dockerfile
    container_name: poc-balance-service
    depends_on:
      - balance-db
      - kafka
      - kafka-init-topics
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"

      # Auth (JWT Bearer via JWKS)
      Jwt__JwksUrl: "http://auth-api:8080/.well-known/jwks.json"

      # Overrides dos appsettings
      ConnectionStrings__DefaultConnection: "Host=balance-db;Port=5432;Database=dbBalance;Username=userBalance;Password=Balance123"
      Kafka__Consumer__BootstrapServers: "kafka:9092"
    ports:
      - "5228:8080"
    networks:
      - poc-net

  auth-api:
    build:
      context: .
      dockerfile: src/Auth.Api/Dockerfile
    container_name: poc-auth-api
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      # Persistência da chave dentro do volume
      Auth__KeyPath: "/data/keys/auth-rsa-key.json"
      # Habilita Swagger no container para facilitar testes
      Swagger__Enabled: "true"
    ports:
      - "5030:8080"
    volumes:
      - ./data/auth-api:/data
    networks:
      - poc-net
