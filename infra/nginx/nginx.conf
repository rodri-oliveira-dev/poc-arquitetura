worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port 7443;

  server {
    listen 443 ssl;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 443 ssl;
    server_name ledger.localhost;

    location = /swagger {
      proxy_pass http://ledger-service:8080/index.html;
    }

    location / {
      proxy_pass http://ledger-service:8080;
    }
  }

  server {
    listen 443 ssl;
    server_name balance.localhost;

    location = /swagger {
      proxy_pass http://balance-service:8080/index.html;
    }

    location / {
      proxy_pass http://balance-service:8080;
    }
  }

  server {
    listen 443 ssl;
    server_name auth.localhost;

    location = /swagger {
      proxy_pass http://auth-api:8080/index.html;
    }

    location / {
      proxy_pass http://auth-api:8080;
    }
  }
}
