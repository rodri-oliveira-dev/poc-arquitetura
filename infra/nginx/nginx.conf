worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $request_id $generated_correlation_id {
    "~^(.{8})(.{4})(.{4})(.{4})(.{12})$" "$1-$2-$3-$4-$5";
    default $request_id;
  }

  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" $generated_correlation_id;
  }

  log_format json_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"host":"$host",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"correlation_id":"$correlation_id",'
      '"user_agent":"$http_user_agent"'
    '}';

  access_log /var/log/nginx/access.log json_access;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  # HSTS stays out of the local edge to avoid browser policy caching for localhost and self-signed certificates.

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port 7443;
  proxy_set_header X-Correlation-Id $correlation_id;
  proxy_hide_header Strict-Transport-Security;

  server {
    listen 443 ssl;
    server_name localhost;

    add_header X-Correlation-Id $correlation_id always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 443 ssl;
    server_name ledger.localhost;

    location = /swagger {
      proxy_pass http://ledger-service:8080/index.html;
    }

    location / {
      proxy_pass http://ledger-service:8080;
    }
  }

  server {
    listen 443 ssl;
    server_name balance.localhost;

    location = /swagger {
      proxy_pass http://balance-service:8080/index.html;
    }

    location / {
      proxy_pass http://balance-service:8080;
    }
  }

  server {
    listen 443 ssl;
    server_name auth.localhost;

    location = /swagger {
      proxy_pass http://auth-api:8080/index.html;
    }

    location / {
      proxy_pass http://auth-api:8080;
    }
  }
}
