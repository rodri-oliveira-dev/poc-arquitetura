load_module /usr/lib/nginx/modules/ngx_http_headers_more_filter_module.so;

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $request_id $generated_correlation_id {
    "~^(.{8})(.{4})(.{4})(.{4})(.{12})$" "$1-$2-$3-$4-$5";
    default $request_id;
  }

  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" $generated_correlation_id;
  }

  log_format json_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"host":"$host",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"correlation_id":"$correlation_id",'
      '"user_agent":"$http_user_agent"'
    '}';

  access_log /var/log/nginx/access.log json_access;
  error_log /var/log/nginx/error.log warn;

  limit_conn_zone $binary_remote_addr zone=per_client_connections:10m;
  limit_req_zone $binary_remote_addr zone=per_client_requests:10m rate=10r/s;

  sendfile on;
  client_max_body_size 1m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 30s;
  send_timeout 30s;
  large_client_header_buffers 4 8k;
  limit_conn per_client_connections 20;
  limit_conn_status 429;
  limit_req zone=per_client_requests burst=40 nodelay;
  limit_req_status 429;
  server_tokens off;
  more_clear_headers Server;

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  # HSTS stays out of the local edge to avoid browser policy caching for localhost and self-signed certificates.

  proxy_http_version 1.1;
  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port 7443;
  proxy_set_header X-Correlation-Id $correlation_id;
  proxy_hide_header Strict-Transport-Security;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header Permissions-Policy;
  proxy_hide_header X-XSS-Protection;
  proxy_hide_header Cache-Control;
  proxy_hide_header Pragma;
  proxy_hide_header Expires;
  proxy_hide_header X-Powered-By;
  proxy_hide_header X-AspNet-Version;
  proxy_hide_header X-AspNetMvc-Version;
  proxy_hide_header X-Swagger-UI-Version;

  upstream ledger_api {
    least_conn;
    server ledger-service-1:8080;
    server ledger-service-2:8080;
  }

  server {
    listen 8080 ssl;
    server_name localhost;

    include /etc/nginx/conf.d/security-headers.conf;
    add_header X-Correlation-Id $correlation_id always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; style-src 'self' 'unsafe-inline'; connect-src 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 8080 ssl;
    server_name ledger.localhost;

    include /etc/nginx/conf.d/security-headers.conf;
    add_header X-Upstream-Addr $upstream_addr always;
    add_header Cache-Control "no-store" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location = /swagger {
      proxy_method GET;
      proxy_pass http://ledger_api/index.html;
    }

    location / {
      proxy_pass http://ledger_api;
    }
  }

  server {
    listen 8080 ssl;
    server_name balance.localhost;

    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-store" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location = /swagger {
      proxy_method GET;
      proxy_pass http://balance-service:8080/index.html;
    }

    location / {
      proxy_pass http://balance-service:8080;
    }
  }

}
