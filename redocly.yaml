extends:
  - recommended

apis:
  ledger@v1:
    root: docs/openapi/ledger.v1.json
  balance@v1:
    root: docs/openapi/balance.v1.json
  transfer@v1:
    root: docs/openapi/transfer.v1.json
  identity@v1:
    root: docs/openapi/identity.v1.json
  audit@v1:
    root: docs/openapi/audit.v1.json

rules:
  info-license: off
  no-server-example.com: off
  no-ambiguous-paths: off
  operation-4xx-response: off
  operation-operationId: warn
  operation-summary: warn
  no-unused-components: warn
  security-defined: warn
